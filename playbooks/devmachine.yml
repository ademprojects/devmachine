---
- name: Provision RHEL 9.6 developer machine
  hosts: "{{ target_hosts | default('devmachines') }}"
  become: true
  gather_facts: true
  roles:
    - role: common_storage
      when: storage_setup_enabled | default(false) | bool
    - role: ide
    - role: ide_vscode
    - role: ide_intellij
    - role: chrome
    - role: xrdp
