---
- name: Provision RHEL 9.6 developer machine
  hosts: "{{ target_hosts | default('devmachines') }}"
  become: true
  gather_facts: true
  roles:
    - role: common_storage
      when: storage_setup_enabled | default(false) | bool
    - role: common_sysctl
    - role: common_locale
    - role: common_sshd
    - role: ide
    - role: app_cli
    - role: ide_vscode
    - role: ide_intellij
    - role: app_chrome
    - role: xrdp
    - role: app_podman
    - role: app_java
    - role: app_pyenv
    - role: app_nvm
    - role: app_maven
    - role: app_git
