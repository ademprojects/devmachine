---
- name: Provision RHEL 9.6 developer machine
  hosts: "{{ target_hosts | default('devmachines') }}"
  become: true
  gather_facts: true
  roles:
    - role: common_vm_owner_facts
    - role: common_storage
    - role: common_nexus
    - role: common_packages
    - role: common_sysctl
    - role: common_locale
    - role: common_sshd
    - role: common_dev_firewall
    - role: common_sudo
    - role: app_workspace
    - role: app_cli
    - role: app_vscode
    - role: app_intellij
    - role: app_chrome
    - role: app_postman
    - role: app_nextcloud
    - role: app_keepassxc
    - role: common_xrdp
    - role: app_keyring
    - role: app_podman
    - role: app_java
    - role: app_pyenv
    - role: app_nvm
    - role: app_maven
    - role: app_git
