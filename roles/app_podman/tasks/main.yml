---
- name: Install podman packages
  ansible.builtin.dnf:
    name: "{{ app_podman_packages }}"
    state: present

- name: Install podman docker compatibility shim
  ansible.builtin.dnf:
    name: podman-docker
    state: present
  when: app_podman_docker_compat | bool

- name: Ensure subuid entry for vm_owner
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ vm_owner_name }}:"
    line: "{{ vm_owner_name }}:{{ app_podman_subuid_start }}:{{ app_podman_subuid_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Ensure subgid entry for vm_owner
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ vm_owner_name }}:"
    line: "{{ vm_owner_name }}:{{ app_podman_subuid_start }}:{{ app_podman_subuid_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Enable systemd lingering for vm_owner
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ vm_owner_name }}"
    creates: "/var/lib/systemd/linger/{{ vm_owner_name }}"
  when: app_podman_enable_lingering | bool

# ---- Container storage relocated to /mnt/data ----

- name: Ensure podman storage base directory exists
  ansible.builtin.file:
    path: "{{ app_podman_storage_base }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure podman storage directory for root exists
  ansible.builtin.file:
    path: "{{ app_podman_storage_base }}/root/storage"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure podman storage directory for vm_owner exists
  ansible.builtin.file:
    path: "{{ app_podman_storage_base }}/user/storage"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0700"

- name: Add SELinux fcontext for podman storage base
  ansible.builtin.command:
    cmd: "semanage fcontext -a -t container_var_lib_t '{{ app_podman_storage_base }}(/.*)?'"
  register: app_podman_fcontext_added
  changed_when: app_podman_fcontext_added.rc == 0
  failed_when:
    - app_podman_fcontext_added.rc != 0
    - "'already defined' not in (app_podman_fcontext_added.stderr | default(''))"

- name: Restore SELinux contexts on podman storage base
  ansible.builtin.command:
    cmd: "restorecon -RvF {{ app_podman_storage_base }}"
  register: app_podman_restorecon
  changed_when: app_podman_restorecon.stdout | length > 0
  failed_when: false
  when: app_podman_fcontext_added.changed

# ---- storage.conf (root + vm_owner) ----

- name: Ensure /etc/containers exists
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write system /etc/containers/storage.conf (root storage)
  ansible.builtin.copy:
    dest: /etc/containers/storage.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [storage]
      driver = "{{ app_podman_storage_driver }}"
      runroot = "/run/containers/storage"
      graphroot = "{{ app_podman_storage_base }}/root/storage"

      [storage.options]
      mount_program = "{{ app_podman_storage_mount_program }}"

- name: Ensure ~vm_owner/.config/containers exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.config/containers"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Write rootless storage.conf for vm_owner
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.config/containers/storage.conf"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
    content: |
      [storage]
      driver = "{{ app_podman_storage_driver }}"
      graphroot = "{{ app_podman_storage_base }}/user/storage"

      [storage.options]
      mount_program = "{{ app_podman_storage_mount_program }}"

# ---- registries.conf (Harbor + unqualified search) ----

- name: Build effective unqualified search registries list
  ansible.builtin.set_fact:
    app_podman_effective_unqualified_search: >-
      {{
        ([app_podman_harbor_host] if (app_podman_harbor_host | length > 0) else [])
        + app_podman_unqualified_search_registries
      }}

- name: Write /etc/containers/registries.conf
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      unqualified-search-registries = {{ app_podman_effective_unqualified_search | to_json }}

      short-name-mode = "permissive"
      {% if app_podman_harbor_host | length > 0 %}

      [[registry]]
      prefix = "{{ app_podman_harbor_host }}"
      location = "{{ app_podman_harbor_host }}"
      {% endif %}

# ---- short-name aliases (drop-in; OS default removed for offline hosts) ----

- name: Ensure /etc/containers/registries.conf.d exists
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: app_podman_harbor_host | length > 0

- name: Remove OS-default shortnames drop-in (points to docker.io, unreachable offline)
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d/000-shortnames.conf
    state: absent
  when: app_podman_harbor_host | length > 0

- name: Write devmachine short-name aliases drop-in
  ansible.builtin.template:
    src: shortnames.conf.j2
    dest: /etc/containers/registries.conf.d/99-devmachine-shortnames.conf
    owner: root
    group: root
    mode: "0644"
  when: app_podman_harbor_host | length > 0

# ---- auth.json from vault (root + vm_owner) ----

- name: Stat podman auth vault file on controller
  ansible.builtin.stat:
    path: "{{ app_podman_auth_json_vault_file }}"
  register: app_podman_auth_vault_stat
  delegate_to: localhost
  become: false
  run_once: true

- name: Read podman auth vault file header on controller
  ansible.builtin.command:
    cmd: "head -c 14 {{ app_podman_auth_json_vault_file }}"
  register: app_podman_auth_vault_header
  changed_when: false
  delegate_to: localhost
  become: false
  run_once: true
  when: app_podman_auth_vault_stat.stat.exists

- name: Assert podman auth vault file is ansible-vault encrypted
  ansible.builtin.assert:
    that:
      - app_podman_auth_vault_header.stdout.startswith('$ANSIBLE_VAULT;')
    fail_msg: >-
      {{ app_podman_auth_json_vault_file }} is not ansible-vault encrypted
      (header does not start with '$ANSIBLE_VAULT;'). Refusing to load potential
      cleartext credentials. Encrypt the file via `ansible-vault encrypt <path>`.
  when: app_podman_auth_vault_stat.stat.exists

- name: Load podman auth.json from vault file
  ansible.builtin.include_vars:
    file: "{{ app_podman_auth_json_vault_file }}"
  when: app_podman_auth_vault_stat.stat.exists
  no_log: true

- name: Report missing auth vault file
  ansible.builtin.debug:
    msg: >-
      {{ app_podman_auth_json_vault_file }} not found — skipping podman auth.json deployment.
      Create the vault file with `app_podman_auth_json` to enable registry login.
  when: not app_podman_auth_vault_stat.stat.exists

- name: Ensure /root/.config/containers exists
  ansible.builtin.file:
    path: /root/.config/containers
    state: directory
    owner: root
    group: root
    mode: "0700"
  when:
    - app_podman_auth_vault_stat.stat.exists
    - app_podman_auth_json is defined

- name: Deploy podman auth.json for root
  ansible.builtin.copy:
    content: "{{ app_podman_auth_json | to_nice_json }}\n"
    dest: /root/.config/containers/auth.json
    owner: root
    group: root
    mode: "0600"
  when:
    - app_podman_auth_vault_stat.stat.exists
    - app_podman_auth_json is defined
  no_log: true

- name: Deploy podman auth.json for vm_owner
  ansible.builtin.copy:
    content: "{{ app_podman_auth_json | to_nice_json }}\n"
    dest: "{{ vm_owner_home }}/.config/containers/auth.json"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0600"
  when:
    - app_podman_auth_vault_stat.stat.exists
    - app_podman_auth_json is defined
  no_log: true

# ---- Verification ----

- name: Verify rootless podman works for vm_owner
  ansible.builtin.command:
    cmd: podman info
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    XDG_RUNTIME_DIR: "/run/user/{{ vm_owner_uid }}"
  register: app_podman_info_check
  changed_when: false
  failed_when: false
  when: app_podman_verify_rootless | bool

- name: Assert rootless podman is functional for vm_owner
  ansible.builtin.assert:
    that:
      - app_podman_info_check.rc == 0
    fail_msg: >-
      podman info failed for {{ vm_owner_name }}.
      stderr={{ app_podman_info_check.stderr | default('') | trim }}
  when: app_podman_verify_rootless | bool
