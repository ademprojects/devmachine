---
- name: Install podman packages
  ansible.builtin.dnf:
    name: "{{ app_podman_packages }}"
    state: present

- name: Install podman docker compatibility shim
  ansible.builtin.dnf:
    name: podman-docker
    state: present
  when: app_podman_docker_compat | bool

- name: Ensure subuid entry for vm_owner
  ansible.builtin.lineinfile:
    path: /etc/subuid
    regexp: "^{{ vm_owner_name }}:"
    line: "{{ vm_owner_name }}:{{ app_podman_subuid_start }}:{{ app_podman_subuid_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Ensure subgid entry for vm_owner
  ansible.builtin.lineinfile:
    path: /etc/subgid
    regexp: "^{{ vm_owner_name }}:"
    line: "{{ vm_owner_name }}:{{ app_podman_subuid_start }}:{{ app_podman_subuid_count }}"
    create: true
    owner: root
    group: root
    mode: "0644"

- name: Enable systemd lingering for vm_owner
  ansible.builtin.command:
    cmd: "loginctl enable-linger {{ vm_owner_name }}"
    creates: "/var/lib/systemd/linger/{{ vm_owner_name }}"
  when: app_podman_enable_lingering | bool

# ---- Container storage relocated to /mnt/data ----

# SELinux context is set explicitly so the file: tasks stay idempotent.
# Without it Ansible re-applies the policy default every run (the FS root
# starts as unlabeled_t on a fresh xfs), and the task reports as changed.
# container_var_lib_t is the type podman expects under its graphroot —
# matches the fcontext rule added below for content created later.
- name: Ensure podman storage base directory exists
  ansible.builtin.file:
    path: "{{ app_podman_storage_base }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
    setype: container_var_lib_t
    seuser: system_u

- name: Ensure podman storage directory for root exists
  ansible.builtin.file:
    path: "{{ app_podman_storage_base }}/root/storage"
    state: directory
    owner: root
    group: root
    mode: "0700"
    setype: container_var_lib_t
    seuser: system_u

- name: Ensure podman storage directory for vm_owner exists
  ansible.builtin.file:
    path: "{{ app_podman_storage_base }}/user/storage"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0700"
    setype: container_var_lib_t
    seuser: system_u

- name: Add SELinux fcontext for podman storage base
  ansible.builtin.command:
    cmd: "semanage fcontext -a -t container_var_lib_t '{{ app_podman_storage_base }}(/.*)?'"
  register: app_podman_fcontext_added
  changed_when: app_podman_fcontext_added.rc == 0
  failed_when:
    - app_podman_fcontext_added.rc != 0
    - "'already defined' not in (app_podman_fcontext_added.stderr | default(''))"

- name: Restore SELinux contexts on podman storage base
  ansible.builtin.command:
    cmd: "restorecon -RvF {{ app_podman_storage_base }}"
  register: app_podman_restorecon
  changed_when: app_podman_restorecon.stdout | length > 0
  failed_when: false
  when: app_podman_fcontext_added.changed

# ---- storage.conf (root + vm_owner) ----

- name: Ensure /etc/containers exists
  ansible.builtin.file:
    path: /etc/containers
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write system /etc/containers/storage.conf (root storage)
  ansible.builtin.copy:
    dest: /etc/containers/storage.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [storage]
      driver = "{{ app_podman_storage_driver }}"
      runroot = "/run/containers/storage"
      graphroot = "{{ app_podman_storage_base }}/root/storage"

      [storage.options]
      mount_program = "{{ app_podman_storage_mount_program }}"

- name: Ensure ~vm_owner/.config/containers exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.config/containers"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Write rootless storage.conf for vm_owner
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.config/containers/storage.conf"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
    content: |
      [storage]
      driver = "{{ app_podman_storage_driver }}"
      graphroot = "{{ app_podman_storage_base }}/user/storage"

      [storage.options]
      mount_program = "{{ app_podman_storage_mount_program }}"

# ---- registries.conf (Harbor + unqualified search) ----

- name: Write /etc/containers/containers.conf (proxy for engine + containers)
  ansible.builtin.template:
    src: containers.conf.j2
    dest: /etc/containers/containers.conf
    owner: root
    group: root
    mode: "0644"

# Defense-in-depth: drop the same proxy env into systemd's environment for the
# rootful podman service AND the systemd-user manager, so any podman process
# launched via systemd (quadlet, podman-auto-update.timer, user-session
# containers) sees HTTP_PROXY even before it parses containers.conf.

- name: Ensure systemd drop-in dirs for podman proxy exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/systemd/system/podman.service.d
    - /etc/systemd/system/user@.service.d

- name: Drop-in proxy env for rootful podman.service
  ansible.builtin.copy:
    dest: /etc/systemd/system/podman.service.d/proxy.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Environment=HTTP_PROXY={{ app_podman_proxy_url }}
      Environment=HTTPS_PROXY={{ app_podman_proxy_url }}
      Environment=NO_PROXY={{ app_podman_no_proxy }}
  notify: Reload systemd

- name: Drop-in proxy env for the rootless systemd-user manager (all users)
  ansible.builtin.copy:
    dest: /etc/systemd/system/user@.service.d/proxy.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Environment=HTTP_PROXY={{ app_podman_proxy_url }}
      Environment=HTTPS_PROXY={{ app_podman_proxy_url }}
      Environment=NO_PROXY={{ app_podman_no_proxy }}
  notify: Reload systemd

- name: Build effective unqualified search registries list
  ansible.builtin.set_fact:
    app_podman_effective_unqualified_search: >-
      {{
        ([app_podman_harbor_host] if (app_podman_harbor_host | length > 0) else [])
        + app_podman_unqualified_search_registries
      }}

- name: Write /etc/containers/registries.conf
  ansible.builtin.copy:
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      unqualified-search-registries = {{ app_podman_effective_unqualified_search | to_json }}

      short-name-mode = "permissive"
      {% if app_podman_harbor_host | length > 0 %}

      [[registry]]
      prefix = "{{ app_podman_harbor_host }}"
      location = "{{ app_podman_harbor_host }}"
      insecure = {{ app_podman_harbor_insecure | bool | tojson }}
      {% endif %}

# ---- short-name aliases (drop-in; OS default removed for offline hosts) ----

- name: Ensure /etc/containers/registries.conf.d exists
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: app_podman_harbor_host | length > 0

- name: Remove OS-default shortnames drop-in (points to docker.io, unreachable offline)
  ansible.builtin.file:
    path: /etc/containers/registries.conf.d/000-shortnames.conf
    state: absent
  when: app_podman_harbor_host | length > 0

- name: Write devmachine short-name aliases drop-in
  ansible.builtin.template:
    src: shortnames.conf.j2
    dest: /etc/containers/registries.conf.d/99-devmachine-shortnames.conf
    owner: root
    group: root
    mode: "0644"
  when: app_podman_harbor_host | length > 0

# ---- auth.json (root + vm_owner) -----------------------------------------
# Expects `app_podman_auth_json` to be defined externally (e.g. inline
# vault-encrypted in host_vars, via `-e @secrets.vault.yml`, or `--extra-vars`).
# Skips silently when unset. The dict is rendered to JSON on the fly.

- name: Report missing app_podman_auth_json
  ansible.builtin.debug:
    msg: >-
      app_podman_auth_json is not defined — skipping podman auth.json deployment.
      Pass it via host_vars / -e to enable registry login.
  when: app_podman_auth_json is not defined

- name: Ensure /root/.config/containers exists
  ansible.builtin.file:
    path: /root/.config/containers
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: app_podman_auth_json is defined

- name: Deploy podman auth.json for root
  ansible.builtin.copy:
    content: "{{ app_podman_auth_json | to_nice_json }}\n"
    dest: /root/.config/containers/auth.json
    owner: root
    group: root
    mode: "0600"
  when: app_podman_auth_json is defined
  no_log: true

- name: Deploy podman auth.json for vm_owner
  ansible.builtin.copy:
    content: "{{ app_podman_auth_json | to_nice_json }}\n"
    dest: "{{ vm_owner_home }}/.config/containers/auth.json"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0600"
  when: app_podman_auth_json is defined
  no_log: true

# ---- profile.d: pin REGISTRY_AUTH_FILE for interactive shells -------------
# podman's auth.json discovery order is REGISTRY_AUTH_FILE →
# $XDG_RUNTIME_DIR/containers/auth.json → $HOME/.config/containers/auth.json.
# Setting REGISTRY_AUTH_FILE explicitly means a shell without a working
# logind session (or with a non-standard XDG_RUNTIME_DIR) still finds the
# file we deployed at $HOME/.config/containers/auth.json.

- name: Write /etc/profile.d snippet for podman auth.json lookup
  ansible.builtin.copy:
    dest: "{{ app_podman_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Ansible-managed (roles/app_podman). Pin REGISTRY_AUTH_FILE for
      # interactive (login) shells so `podman pull|login|push` finds the
      # auth.json deployed under ~/.config/containers/ even if XDG_RUNTIME_DIR
      # is unset. systemd-spawned podman uses containers.conf [engine] env
      # for proxy + the daemon-side config — not this file.
      if [ -f "$HOME/.config/containers/auth.json" ]; then
          export REGISTRY_AUTH_FILE="$HOME/.config/containers/auth.json"
      fi

# ---- Verification ----

- name: Verify rootless podman works for vm_owner
  ansible.builtin.shell:
    cmd: |
      set -uo pipefail
      echo "HOME=${HOME:-<unset>}"
      echo "XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-<unset>}"
      echo "REGISTRY_AUTH_FILE=${REGISTRY_AUTH_FILE:-<unset>}"
      echo "auth.json present: $(test -f "$HOME/.config/containers/auth.json" && echo yes || echo no)"
      podman info
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    XDG_RUNTIME_DIR: "/run/user/{{ vm_owner_uid }}"
  register: app_podman_info_check
  changed_when: false
  failed_when: false
  when: app_podman_verify_rootless | bool

- name: Assert rootless podman is functional for vm_owner
  ansible.builtin.assert:
    that:
      - app_podman_info_check.rc == 0
    fail_msg: >-
      podman info failed for {{ vm_owner_name }}.
      diagnostic head:
      {{ app_podman_info_check.stdout_lines[:4] | default([]) | join(' | ') }}
      stderr={{ app_podman_info_check.stderr | default('') | trim }}
  when: app_podman_verify_rootless | bool

# ---- Pre-pull configured images (rootless) -------------------------------
# Two-step pattern keeps re-runs cheap: first check existence per image
# (idempotent, never marked changed), then pull only the missing ones.
# REGISTRY_AUTH_FILE is set explicitly so the pull uses the auth.json we
# deployed even if XDG_RUNTIME_DIR is missing from the elevated session.

- name: Check which configured podman images are already present locally
  ansible.builtin.command:
    cmd: "podman image exists {{ item }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    XDG_RUNTIME_DIR: "/run/user/{{ vm_owner_uid }}"
  register: app_podman_image_check
  changed_when: false
  failed_when: false
  loop: "{{ app_podman_images_to_pull }}"
  loop_control:
    label: "{{ item }}"
  when: app_podman_images_to_pull | length > 0

- name: Pull configured podman images (rootless, vm_owner)
  ansible.builtin.command:
    cmd: "podman pull {{ item.item }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    XDG_RUNTIME_DIR: "/run/user/{{ vm_owner_uid }}"
    REGISTRY_AUTH_FILE: "{{ vm_owner_home }}/.config/containers/auth.json"
  loop: "{{ app_podman_image_check.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - app_podman_images_to_pull | length > 0
    - (item.rc | default(0)) != 0
