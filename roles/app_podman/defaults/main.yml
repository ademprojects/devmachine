---
app_podman_packages:
  - podman
  - fuse-overlayfs
  - slirp4netns
  - crun
  - shadow-utils
  - policycoreutils-python-utils
app_podman_docker_compat: false
app_podman_subuid_start: 100000
app_podman_subuid_count: 65536
app_podman_enable_lingering: true
app_podman_verify_rootless: true

# Container image / layer storage relocated to the data disk
app_podman_storage_base: "{{ common_storage_mount_point | default('/mnt/data') }}/containers"
app_podman_storage_driver: overlay
app_podman_storage_mount_program: /usr/bin/fuse-overlayfs

# Proxy for podman itself (registry pulls from Harbor etc.) and the env
# passed into containers at runtime. /etc/profile.d only covers interactive
# shells; containers.conf [engine] env is what systemd-spawned podman picks
# up. Same proxy_url as common_nexus by default.
app_podman_proxy_url: "{{ proxy_url }}"
app_podman_no_proxy: "{{ common_nexus_no_proxy }}"

# /etc/profile.d snippet that exports REGISTRY_AUTH_FILE for interactive
# shells. Pinning the file path here means podman doesn't have to derive
# it from XDG_RUNTIME_DIR / HOME at lookup time — useful if a shell ever
# lands without a proper logind session.
app_podman_profile_path: /etc/profile.d/app-podman.sh

# Registry config — Harbor referenced and used as unqualified search target.
# `_insecure: true` skips TLS verification (use when Harbor presents a
# self-signed / internal-CA cert and you can't / don't want to ship the CA
# bundle). Default false; flip per host if needed.
app_podman_harbor_host: ""
app_podman_harbor_insecure: true
app_podman_unqualified_search_registries: []

# Short-name aliases — drop-in /etc/containers/registries.conf.d/99-devmachine-shortnames.conf.
# The OS-default 000-shortnames.conf is removed by the role because its docker.io
# targets are unreachable on offline hosts. Add/override entries via group_vars
# or host_vars as needed.
app_podman_shortname_aliases:
  alpine: "{{ app_podman_harbor_host }}/library/alpine"
  busybox: "{{ app_podman_harbor_host }}/library/busybox"
  debian: "{{ app_podman_harbor_host }}/library/debian"
  fedora: "{{ app_podman_harbor_host }}/library/fedora"
  ubuntu: "{{ app_podman_harbor_host }}/library/ubuntu"
  nginx: "{{ app_podman_harbor_host }}/library/nginx"
  httpd: "{{ app_podman_harbor_host }}/library/httpd"
  haproxy: "{{ app_podman_harbor_host }}/library/haproxy"
  redis: "{{ app_podman_harbor_host }}/library/redis"
  postgres: "{{ app_podman_harbor_host }}/library/postgres"
  mariadb: "{{ app_podman_harbor_host }}/library/mariadb"
  mongo: "{{ app_podman_harbor_host }}/library/mongo"
  python: "{{ app_podman_harbor_host }}/library/python"
  node: "{{ app_podman_harbor_host }}/library/node"
  openjdk: "{{ app_podman_harbor_host }}/library/openjdk"

# auth.json for podman / docker registry login (root + vm_owner).
# Pass `app_podman_auth_json` as a dict via host_vars (vault-encrypted inline,
# `!vault` block) or `-e @secrets.yml --ask-vault-pass` — no file path here.
# Example structure:
#   app_podman_auth_json:
#     auths:
#       "harbor.firma.intern":
#         auth: "BASE64_USER_PASS"
# Undefined → role skips the auth.json deploy.

# Container images to pre-pull during provisioning (rootless, as vm_owner).
# Each entry is whatever podman accepts on the command line — a fully-qualified
# reference like "harbor.firma.intern/library/postgres:16" or a short name
# that resolves through registries.conf / shortnames.conf above.
# Empty by default; populate via host_vars / group_vars, e.g.:
#   app_podman_images_to_pull:
#     - harbor.firma.intern/library/postgres:16
#     - harbor.firma.intern/library/mariadb:11
# The role skips images that already exist locally, so re-runs are cheap.
app_podman_images_to_pull: []
