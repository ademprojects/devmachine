---
# --- Concern 1: extend an existing root LV with the free space left in its VG
# (e.g. the 2.9 GiB usually unallocated in vg0 by RHEL 9 default partitioning).
# Idempotent — no-op when the VG has no free space.
common_storage_grow_root_enabled: true
common_storage_grow_root_vg: vg0
common_storage_grow_root_lv: root

# --- Concern 2: set up a dedicated data disk (fresh PV + VG + LV + mount).
# Used for offloading bulky app installs and per-user dev data off the OS disk.
common_storage_setup_enabled: true
common_storage_device: /dev/sdb
common_storage_vg_name: vg_devdata
common_storage_lv_name: lv_workspaces
common_storage_lv_size: 100%FREE
common_storage_fs_type: xfs
common_storage_mount_point: /mnt/data
common_storage_mount_mode: "0755"
common_storage_mount_options: "defaults,noatime,nodiratime"
# SELinux context for the mount point root. mkfs.xfs leaves the new FS root
# with `unlabeled_t`; without an explicit setype/seuser Ansible re-applies
# the policy default every run, so the "Ensure workspace mount point" task
# is forever "changed". xfs stores the SELinux context in xattr, so once
# set explicitly the value is persistent. Defaults match `matchpathcon /mnt/data`
# under the RHEL targeted policy — override if you point the mount somewhere else.
common_storage_mount_setype: mnt_t
common_storage_mount_seuser: system_u

# --- Concern 3: relocate $TMPDIR to the data disk.
# RHEL hardening templates often mount /tmp as tmpfs with `noexec`, which
# breaks every JVM-based tool (IntelliJ Gateway backend, python-build, …):
# they extract native libs into tmp and dlopen them. Setting TMPDIR via
# /etc/environment makes PAM-mediated sessions (including non-interactive
# SSH, which Gateway uses) pick up a writable + exec-allowed temp dir on
# /mnt/data instead. Set to "" to disable.
common_storage_tmpdir_path: "{{ common_storage_mount_point }}/tmp"

# --- Concern 4: drop the noexec mount option from /tmp (tmp.mount).
# Sister to Concern 3 — TMPDIR redirects newly-spawned PAM sessions, but
# daemons/services that hardcode "/tmp" (JetBrains background helpers,
# language servers, native build hooks) still hit noexec. Writing a
# systemd drop-in for tmp.mount removes noexec while keeping nosuid + nodev,
# so /tmp stays an attack-surface-limited tmpfs. CIS-Benchmark item 1.1.2.4
# is relaxed by this — disable if you must stay CIS-conform.
# Takes effect after `systemctl daemon-reload && systemctl restart tmp.mount`
# (we trigger daemon-reload via handler; a reboot is the cleanest way to
# apply the new mount options without disturbing running sessions).
common_storage_tmp_remove_noexec: true
common_storage_tmp_mount_options: "mode=1777,strictatime,nosuid,nodev"
