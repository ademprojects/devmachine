---
- name: Discover Postman tarball in role files
  ansible.builtin.set_fact:
    app_postman_tarball_files: >-
      {{
        query('fileglob', role_path ~ '/files/*.tar.gz')
        | map('basename')
        | reject('match', '^\\.')
        | sort
      }}

- name: Fail when no Postman tarball is present in role files
  ansible.builtin.fail:
    msg: >-
      No Postman tarball found in roles/app_postman/files/.
      Run `tools/download-tools.sh` on the controller to fetch the latest one.
  when: app_postman_tarball_files | length == 0
  run_once: true

- name: Fail when more than one Postman tarball is present
  ansible.builtin.fail:
    msg: >-
      Multiple Postman tarballs found in roles/app_postman/files/
      ({{ app_postman_tarball_files | join(', ') }}). Keep only one.
  when: app_postman_tarball_files | length > 1
  run_once: true

- name: Ensure Postman package directory exists
  ansible.builtin.file:
    path: "{{ app_postman_package_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy Postman tarball to remote host
  ansible.builtin.copy:
    src: "{{ app_postman_tarball_files[0] }}"
    dest: "{{ app_postman_package_dir }}/{{ app_postman_tarball_files[0] }}"
    mode: "0644"

- name: Extract Postman tarball
  ansible.builtin.unarchive:
    src: "{{ app_postman_package_dir }}/{{ app_postman_tarball_files[0] }}"
    dest: "{{ app_postman_install_dir | dirname }}"
    remote_src: true
    owner: root
    group: root

# Postman's watcher.node demands GLIBCXX_3.4.30 (gcc 12+). RHEL 9 base
# libstdc++ stops at 3.4.29, so pull in gcc-toolset-13's runtime and the
# launcher wrapper below prepends its lib dir via LD_LIBRARY_PATH.
- name: Install libstdc++ runtime with GLIBCXX_3.4.30+ for Postman
  ansible.builtin.dnf:
    name: "{{ app_postman_libstdcxx_packages }}"
    state: present

- name: Install Postman Electron runtime dependencies
  ansible.builtin.dnf:
    name: "{{ app_postman_runtime_packages }}"
    state: present
  when: app_postman_runtime_packages | length > 0

- name: Replace any prior symlink at the Postman launcher path
  ansible.builtin.file:
    path: "{{ app_postman_symlink }}"
    state: absent

- name: Write Postman launcher wrapper (injects newer libstdc++)
  ansible.builtin.copy:
    dest: "{{ app_postman_symlink }}"
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      # Ansible-managed (roles/app_postman). Postman's @parcel/watcher
      # native module is compiled against GLIBCXX_3.4.30 (gcc 12+).
      # RHEL 9 base libstdc++ stops at 3.4.29, so prepend gcc-toolset-13's
      # libstdc++.so.6.0.32 via LD_LIBRARY_PATH before exec'ing Postman.
      # Use ${VAR:+:$VAR} pattern to avoid a trailing colon (which would
      # add "search current dir" semantics to ld.so).
      export LD_LIBRARY_PATH="{{ app_postman_libstdcxx_lib_dir }}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      exec "{{ app_postman_install_dir }}/{{ app_postman_executable_name }}" "$@"

# Postman's tarball ships an icon (typically app/resources/app/assets/icon.png)
# but doesn't register it in any theme directory. Find the largest icon in the
# extracted tree and drop it into hicolor/512x512/apps/<name>.png so the
# .desktop Icon= name resolves consistently across XFCE menus + notifications.
- name: Locate Postman icon in extracted tarball
  ansible.builtin.find:
    paths: "{{ app_postman_install_dir }}"
    patterns: 'icon.png,postman.png,Postman.png'
    file_type: file
    recurse: true
  register: app_postman_found_icons

- name: Assert Postman icon was discovered
  ansible.builtin.assert:
    that: app_postman_found_icons.files | length > 0
    fail_msg: >-
      No icon.png/postman.png found under {{ app_postman_install_dir }} —
      Postman tarball layout may have changed; widen the find patterns above.

- name: Install Postman icon into hicolor theme
  ansible.builtin.copy:
    src: "{{ (app_postman_found_icons.files | sort(attribute='size', reverse=true) | first).path }}"
    dest: "/usr/share/icons/hicolor/512x512/apps/{{ app_postman_desktop_icon }}.png"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: Refresh GTK icon cache for hicolor theme
  ansible.builtin.command:
    cmd: gtk-update-icon-cache -f -t /usr/share/icons/hicolor
  changed_when: false
  failed_when: false

- name: Write Postman desktop entry
  ansible.builtin.copy:
    dest: "{{ app_postman_desktop_entry }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=Postman
      GenericName=API Tool
      Comment=Postman API Platform
      Exec={{ app_postman_symlink }} %U
      Icon={{ app_postman_desktop_icon }}
      Terminal=false
      Categories=Development;Network;Utility;
      StartupWMClass=Postman

- name: Ensure ~vm_owner/Desktop exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/Desktop"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Copy Postman desktop entry to vm_owner's Desktop
  ansible.builtin.copy:
    src: "{{ app_postman_desktop_entry }}"
    dest: "{{ vm_owner_home }}/Desktop/{{ app_postman_desktop_entry | basename }}"
    remote_src: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
