---
app_git_target_root: /mnt/data
app_git_user_name: ""
app_git_user_email: ""
app_git_global_config:
  init.defaultBranch: main
  pull.rebase: "false"
  fetch.prune: "true"
  core.editor: vim
  credential.helper: "cache --timeout=14400"
# Repositories to clone at first user login. Each entry needs `repo` (SSH URL)
# and `target` (absolute path under app_git_target_root). Put targets under
# {{ app_workspace_root }}/git/ so they show up in ~/work/git/<name> — VS Code
# and IntelliJ open them via "Open Folder" / "Open" on that path. The IDEs do
# not auto-discover repos; they remember whatever the user opens.
#
# Example:
# app_git_repos:
#   - repo: git@github.com:myorg/service-a.git
#     target: /mnt/data/work/git/service-a
#   - repo: git@gitlab.firma.intern:team/service-b.git
#     target: /mnt/data/work/git/service-b
app_git_repos: []
