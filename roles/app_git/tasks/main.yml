---
- name: Validate repo entries have required keys
  ansible.builtin.assert:
    that:
      - item.repo is defined
      - item.repo | length > 0
      - item.target is defined
      - item.target | length > 0
    fail_msg: "app_git_repos entry must define 'repo' and 'target': got {{ item }}"
  loop: "{{ app_git_repos }}"
  loop_control:
    label: "{{ item.target | default('?') }}"

- name: Validate repo target paths are absolute and under app_git_target_root
  ansible.builtin.assert:
    that:
      - item.target.startswith(app_git_target_root ~ '/')
      - '".." not in (item.target | split("/"))'
    fail_msg: >-
      Repository target '{{ item.target }}' must be an absolute path under
      {{ app_git_target_root }} and must not contain '..' segments.
  loop: "{{ app_git_repos }}"
  loop_control:
    label: "{{ item.target }}"

- name: Install git and openssh-clients
  ansible.builtin.dnf:
    name:
      - git
      - openssh-clients
    state: present

- name: Configure git user.name for vm_owner
  ansible.builtin.git_config:
    name: user.name
    scope: global
    value: "{{ app_git_user_name }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  when: app_git_user_name | length > 0

- name: Configure git user.email for vm_owner
  ansible.builtin.git_config:
    name: user.email
    scope: global
    value: "{{ app_git_user_email }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  when: app_git_user_email | length > 0

- name: Apply git global config defaults for vm_owner
  ansible.builtin.git_config:
    name: "{{ item.key }}"
    scope: global
    value: "{{ item.value }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  loop: "{{ app_git_global_config | dict2items }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"

- name: Report missing SSH key (clone autostart will not be deployed)
  ansible.builtin.debug:
    msg: >-
      No ssh_privkey configured for {{ vm_owner_name }};
      skipping autostart for {{ app_git_repos | length }} repo clone(s).
      Add ssh_privkey to user_data and re-run the playbook to pick them up.
  when:
    - app_git_repos | length > 0
    - vm_owner_ssh_privkey | length == 0

# Pre-create each repo's target directory so the generated VS Code workspace
# (devmachine.code-workspace) and IntelliJ recent projects open cleanly even
# before the first-login clone runs. `git clone` is happy with an existing
# empty directory.
- name: Pre-create repo target directories
  ansible.builtin.file:
    path: "{{ item.target }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
  loop: "{{ app_git_repos }}"
  loop_control:
    label: "{{ item.target }}"
  when: app_git_repos | length > 0

# Repo clones happen at first user login (not during the Ansible run): the SSH
# key is passphrase-encrypted, so we need gnome-keyring's ssh-agent to be
# available — which only happens after pam_gnome_keyring unlocks the keyring at
# login. We drop a script + autostart entry; the script self-removes once every
# repo is present, so subsequent logins are a no-op.

- name: Ensure ~/.local/bin exists for vm_owner
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.local/bin"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
  when:
    - app_git_repos | length > 0
    - vm_owner_ssh_privkey | length > 0

- name: Ensure ~/.config/autostart exists for vm_owner
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.config/autostart"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
  when:
    - app_git_repos | length > 0
    - vm_owner_ssh_privkey | length > 0

- name: Deploy clone-repos script for first-login autostart
  ansible.builtin.template:
    src: devmachine-clone-repos.sh.j2
    dest: "{{ vm_owner_home }}/.local/bin/devmachine-clone-repos.sh"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
  when:
    - app_git_repos | length > 0
    - vm_owner_ssh_privkey | length > 0

- name: Deploy autostart entry for clone-repos script
  ansible.builtin.template:
    src: devmachine-clone-repos.desktop.j2
    dest: "{{ vm_owner_home }}/.config/autostart/devmachine-clone-repos.desktop"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
  when:
    - app_git_repos | length > 0
    - vm_owner_ssh_privkey | length > 0

# IDE bootstrap files. Both rendered with force: false — Ansible only seeds them
# on first deploy, IDEs (or the user) own them afterwards. To refresh after an
# app_git_repos change, delete the file and re-run.

- name: Deploy VS Code multi-root workspace file
  ansible.builtin.template:
    src: devmachine.code-workspace.j2
    dest: "{{ app_workspace_root | default(app_git_target_root + '/work') }}/devmachine.code-workspace"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
    force: false
  when:
    - app_git_repos | length > 0

- name: Ensure IntelliJ per-user options dir exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.config/JetBrains/{{ app_intellij_data_dir_name }}/options"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0700"
  when:
    - app_git_repos | length > 0
    - app_intellij_data_dir_name is defined

- name: Pre-populate IntelliJ recent projects
  ansible.builtin.template:
    src: recentProjects.xml.j2
    dest: "{{ vm_owner_home }}/.config/JetBrains/{{ app_intellij_data_dir_name }}/options/recentProjects.xml"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0600"
    force: false
  when:
    - app_git_repos | length > 0
    - app_intellij_data_dir_name is defined
