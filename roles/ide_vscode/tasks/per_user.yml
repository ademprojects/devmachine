---
- name: Read passwd entry for VS Code target user
  ansible.builtin.getent:
    database: passwd
    key: "{{ ide_vscode_target_user }}"

- name: Resolve target user home directory
  ansible.builtin.set_fact:
    ide_vscode_target_user_home: "{{ ansible_facts.getent_passwd[ide_vscode_target_user][4] }}"

- name: Verify VS Code CLI is available for {{ ide_vscode_target_user }}
  ansible.builtin.command:
    cmd: /usr/bin/code --version
  become: true
  become_user: "{{ ide_vscode_target_user }}"
  environment:
    HOME: "{{ ide_vscode_target_user_home }}"
  register: ide_vscode_cli_check
  changed_when: false
  failed_when: false

- name: Fail when VS Code CLI is unavailable for {{ ide_vscode_target_user }}
  ansible.builtin.assert:
    that:
      - ide_vscode_cli_check.rc == 0
    fail_msg: >-
      VS Code CLI ('code') is not available for user {{ ide_vscode_target_user }}.
      Verify that the VS Code RPM was installed successfully.

- name: List installed VS Code extensions for {{ ide_vscode_target_user }}
  ansible.builtin.command:
    cmd: code --list-extensions
  become: true
  become_user: "{{ ide_vscode_target_user }}"
  environment:
    HOME: "{{ ide_vscode_target_user_home }}"
  register: ide_vscode_installed_extensions
  changed_when: false
  failed_when: false

- name: Fail when installed VS Code extensions cannot be read for {{ ide_vscode_target_user }}
  ansible.builtin.assert:
    that:
      - ide_vscode_installed_extensions.rc == 0
    fail_msg: >-
      Failed to list VS Code extensions for {{ ide_vscode_target_user }}.
      stdout={{ ide_vscode_installed_extensions.stdout | default('') | trim }}
      stderr={{ ide_vscode_installed_extensions.stderr | default('') | trim }}

- name: Normalize installed VS Code extension IDs
  ansible.builtin.set_fact:
    ide_vscode_installed_extensions_lc: "{{ ide_vscode_installed_extensions.stdout_lines | map('lower') | list }}"

- name: Install missing VS Code extensions for {{ ide_vscode_target_user }}
  ansible.builtin.command:
    cmd: "code --install-extension {{ ide_vscode_package_dir }}/{{ item.filename }}"
  become: true
  become_user: "{{ ide_vscode_target_user }}"
  environment:
    HOME: "{{ ide_vscode_target_user_home }}"
  loop: "{{ ide_vscode_extensions }}"
  when: (item.id | lower) not in ide_vscode_installed_extensions_lc
