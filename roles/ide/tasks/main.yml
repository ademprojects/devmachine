---
- name: Validate vm_owner contains exactly one user
  ansible.builtin.assert:
    that:
      - vm_owner is iterable
      - vm_owner is not string
      - vm_owner | length == 1
      - vm_owner[0] | length > 0
    fail_msg: "vm_owner must be a list with exactly one user name."

- name: Read passwd entry for vm_owner
  ansible.builtin.getent:
    database: passwd
    key: "{{ vm_owner[0] }}"

- name: Read group entries
  ansible.builtin.getent:
    database: group

- name: Resolve target user home directory
  ansible.builtin.set_fact:
    ide_user_home: "{{ ansible_facts.getent_passwd[vm_owner[0]][4] }}"

- name: Resolve target user primary group
  ansible.builtin.set_fact:
    ide_user_group: >-
      {{
        ansible_facts.getent_group
        | dict2items
        | selectattr('value.1', 'equalto', ansible_facts.getent_passwd[vm_owner[0]][2])
        | map(attribute='key')
        | first
      }}

- name: Ensure target user primary group was resolved
  ansible.builtin.assert:
    that:
      - ide_user_group | length > 0
    fail_msg: "Unable to resolve primary group for vm_owner {{ vm_owner[0] }}."

- name: Ensure workspace root directory exists
  ansible.builtin.file:
    path: "{{ devmachine_workspace_root }}"
    state: directory
    mode: "0755"
  when: devmachine_workspace_setup_enabled | bool

- name: Ensure vm_owner workspace directory exists
  ansible.builtin.file:
    path: "{{ devmachine_workspace_root }}/{{ vm_owner[0] }}"
    state: directory
    owner: "{{ vm_owner[0] }}"
    group: "{{ ide_user_group }}"
    mode: "0755"
  when: devmachine_workspace_setup_enabled | bool

- name: Ensure workspace symlink exists in vm_owner home
  ansible.builtin.file:
    src: "{{ devmachine_workspace_root }}/{{ vm_owner[0] }}"
    dest: "{{ ide_user_home }}/{{ devmachine_workspace_link_name }}"
    state: link
    force: true
  when: devmachine_workspace_setup_enabled | bool

- name: Configure passwordless sudo for vm_owner
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ vm_owner[0] }}"
    content: "{{ vm_owner[0] }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  when: devmachine_sudo_nopasswd | bool
