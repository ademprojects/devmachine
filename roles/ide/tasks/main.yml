---
- name: Ensure ansible login user exists
  ansible.builtin.user:
    name: "{{ devmachine_ansible_login_user }}"
    shell: "{{ devmachine_ansible_login_shell }}"
    create_home: true
    state: present

- name: Ensure ansible login key passphrase is set
  ansible.builtin.assert:
    that:
      - devmachine_ansible_login_ssh_key_passphrase | length > 0
    fail_msg: "Set devmachine_ansible_login_ssh_key_passphrase to generate a password-protected SSH key."
  delegate_to: localhost
  become: false
  run_once: true

- name: Ensure local SSH key directory exists
  ansible.builtin.file:
    path: "{{ devmachine_ansible_login_ssh_key_path | dirname }}"
    state: directory
    mode: "0700"
  delegate_to: localhost
  become: false
  run_once: true

- name: Generate password-protected SSH key for ansible login user
  ansible.builtin.command:
    cmd: >-
      ssh-keygen -t ed25519 -C "{{ devmachine_ansible_login_ssh_key_comment }}"
      -N "{{ devmachine_ansible_login_ssh_key_passphrase }}"
      -f "{{ devmachine_ansible_login_ssh_key_path }}"
  args:
    creates: "{{ devmachine_ansible_login_ssh_key_path }}"
  delegate_to: localhost
  become: false
  run_once: true
  no_log: true

- name: Ensure SSH directory for ansible login user exists
  ansible.builtin.file:
    path: "/home/{{ devmachine_ansible_login_user }}/.ssh"
    state: directory
    owner: "{{ devmachine_ansible_login_user }}"
    group: "{{ devmachine_ansible_login_user }}"
    mode: "0700"

- name: Configure authorized key for ansible login user
  ansible.builtin.copy:
    dest: "/home/{{ devmachine_ansible_login_user }}/.ssh/authorized_keys"
    content: "{{ lookup('file', devmachine_ansible_login_ssh_key_path + '.pub') }}\n"
    owner: "{{ devmachine_ansible_login_user }}"
    group: "{{ devmachine_ansible_login_user }}"
    mode: "0600"

- name: Ensure package directory exists
  ansible.builtin.file:
    path: "{{ devmachine_package_dir }}"
    state: directory
    mode: "0755"

- name: Check local VS Code package presence
  ansible.builtin.stat:
    path: "{{ devmachine_local_package_dir }}/{{ devmachine_vscode_rpm }}"
  register: devmachine_local_vscode_stat
  delegate_to: localhost
  become: false
  run_once: true

- name: Check local IntelliJ archive presence
  ansible.builtin.stat:
    path: "{{ devmachine_local_package_dir }}/{{ devmachine_intellij_archive }}"
  register: devmachine_local_intellij_stat
  delegate_to: localhost
  become: false
  run_once: true

- name: Check local VS Code extension package presence
  ansible.builtin.stat:
    path: "{{ devmachine_local_package_dir }}/{{ item.filename }}"
  register: devmachine_local_vscode_extension_stats
  loop: "{{ devmachine_vscode_extensions }}"
  delegate_to: localhost
  become: false
  run_once: true

- name: Fail when local VS Code package is missing
  ansible.builtin.fail:
    msg: "VS Code RPM not found at {{ devmachine_local_package_dir }}/{{ devmachine_vscode_rpm }}"
  when: not devmachine_local_vscode_stat.stat.exists
  run_once: true

- name: Fail when local IntelliJ archive is missing
  ansible.builtin.fail:
    msg: "IntelliJ archive not found at {{ devmachine_local_package_dir }}/{{ devmachine_intellij_archive }}"
  when: not devmachine_local_intellij_stat.stat.exists
  run_once: true

- name: Fail when local VS Code extension package is missing
  ansible.builtin.fail:
    msg: "VS Code extension package not found at {{ devmachine_local_package_dir }}/{{ item.item.filename }}"
  when: not item.stat.exists
  loop: "{{ devmachine_local_vscode_extension_stats.results }}"
  run_once: true

- name: Copy VS Code package to remote host
  ansible.builtin.copy:
    src: "{{ devmachine_local_package_dir }}/{{ devmachine_vscode_rpm }}"
    dest: "{{ devmachine_package_dir }}/{{ devmachine_vscode_rpm }}"
    mode: "0644"

- name: Copy IntelliJ archive to remote host
  ansible.builtin.copy:
    src: "{{ devmachine_local_package_dir }}/{{ devmachine_intellij_archive }}"
    dest: "{{ devmachine_package_dir }}/{{ devmachine_intellij_archive }}"
    mode: "0644"

- name: Copy VS Code extension packages to remote host
  ansible.builtin.copy:
    src: "{{ devmachine_local_package_dir }}/{{ item.filename }}"
    dest: "{{ devmachine_package_dir }}/{{ item.filename }}"
    mode: "0644"
  loop: "{{ devmachine_vscode_extensions }}"

- name: Read VS Code checksum when provided
  ansible.builtin.stat:
    path: "{{ devmachine_package_dir }}/{{ devmachine_vscode_rpm }}"
    checksum_algorithm: sha256
  register: devmachine_vscode_checksum_stat
  when: devmachine_vscode_sha256 | length > 0

- name: Assert VS Code checksum matches expected value
  ansible.builtin.assert:
    that:
      - devmachine_vscode_checksum_stat.stat.checksum == devmachine_vscode_sha256
    fail_msg: "VS Code checksum mismatch for {{ devmachine_vscode_rpm }}"
  when: devmachine_vscode_sha256 | length > 0

- name: Read IntelliJ checksum when provided
  ansible.builtin.stat:
    path: "{{ devmachine_package_dir }}/{{ devmachine_intellij_archive }}"
    checksum_algorithm: sha256
  register: devmachine_intellij_checksum_stat
  when: devmachine_intellij_sha256 | length > 0

- name: Assert IntelliJ checksum matches expected value
  ansible.builtin.assert:
    that:
      - devmachine_intellij_checksum_stat.stat.checksum == devmachine_intellij_sha256
    fail_msg: "IntelliJ checksum mismatch for {{ devmachine_intellij_archive }}"
  when: devmachine_intellij_sha256 | length > 0

- name: Configure Nexus as DNF repository
  ansible.builtin.yum_repository:
    name: "{{ devmachine_dnf_repo_name }}"
    description: "{{ devmachine_dnf_repo_description }}"
    baseurl: "{{ devmachine_dnf_repo_url }}"
    enabled: true
    gpgcheck: "{{ devmachine_dnf_gpgcheck }}"
    gpgkey: "{{ devmachine_dnf_gpgkey if (devmachine_dnf_gpgkey | length > 0) else omit }}"

- name: Install Java development packages
  ansible.builtin.dnf:
    name: "{{ devmachine_java_packages }}"
    state: present

- name: Install VS Code from local RPM
  ansible.builtin.dnf:
    name: "{{ devmachine_package_dir }}/{{ devmachine_vscode_rpm }}"
    state: present

- name: Ensure IntelliJ install directory exists
  ansible.builtin.file:
    path: "{{ devmachine_intellij_install_dir }}"
    state: directory
    mode: "0755"

- name: Find existing IntelliJ directories
  ansible.builtin.find:
    paths: "{{ devmachine_intellij_install_dir }}"
    file_type: directory
    patterns: "idea-*"
    recurse: false
  register: devmachine_existing_intellij_dirs

- name: Remove existing IntelliJ directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ devmachine_existing_intellij_dirs.files }}"
  when: devmachine_existing_intellij_dirs.matched | int > 0

- name: Extract IntelliJ archive
  ansible.builtin.unarchive:
    src: "{{ devmachine_package_dir }}/{{ devmachine_intellij_archive }}"
    dest: "{{ devmachine_intellij_install_dir }}"
    remote_src: true

- name: Find extracted IntelliJ directory
  ansible.builtin.find:
    paths: "{{ devmachine_intellij_install_dir }}"
    file_type: directory
    patterns: "idea-*"
    recurse: false
  register: devmachine_intellij_dirs

- name: Fail when IntelliJ extraction did not produce expected directory
  ansible.builtin.fail:
    msg: "No extracted IntelliJ directory found in {{ devmachine_intellij_install_dir }}"
  when: devmachine_intellij_dirs.matched | int == 0

- name: Set IntelliJ home
  ansible.builtin.set_fact:
    devmachine_intellij_home: "{{ devmachine_intellij_dirs.files[0].path }}"
  when: devmachine_intellij_dirs.matched | int > 0

- name: Symlink IntelliJ launcher
  ansible.builtin.file:
    src: "{{ devmachine_intellij_home }}/bin/idea.sh"
    dest: "{{ devmachine_intellij_symlink }}"
    state: link
    force: true

- name: Validate target user input
  ansible.builtin.assert:
    that:
      - devmachine_target_user is match('^[a-z_](?:[a-z0-9_-]*[a-z0-9_])?$')
    fail_msg: "devmachine_target_user contains unsupported characters."

- name: Read target user passwd entry
  ansible.builtin.getent:
    database: passwd
    key: "{{ devmachine_target_user }}"
  when: devmachine_user_home | length == 0 or devmachine_target_group | length == 0

- name: Read system group entries
  ansible.builtin.getent:
    database: group
  when: devmachine_target_group | length == 0

- name: Determine effective target group
  ansible.builtin.set_fact:
    devmachine_effective_target_group: >-
      {{
        devmachine_target_group
        if (devmachine_target_group | length > 0)
        else (
          ansible_facts.getent_group
          | dict2items
          | selectattr('value.1', 'equalto', ansible_facts.getent_passwd[devmachine_target_user][2])
          | map(attribute='key')
          | first
        )
      }}

- name: Ensure effective target group was resolved
  ansible.builtin.assert:
    that:
      - devmachine_effective_target_group | length > 0
    fail_msg: "Unable to resolve primary group for {{ devmachine_target_user }}."

- name: Determine effective target user home
  ansible.builtin.set_fact:
    devmachine_effective_user_home: >-
      {{
        devmachine_user_home
        if (devmachine_user_home | length > 0)
        else (ansible_facts.getent_passwd[devmachine_target_user][4])
      }}

- name: Ensure optional general user exists
  ansible.builtin.user:
    name: "{{ devmachine_general_user }}"
    shell: "{{ devmachine_general_user_shell }}"
    create_home: true
    state: present
  when: devmachine_general_user_enabled | bool

- name: Ensure workspace root directory exists
  ansible.builtin.file:
    path: "{{ devmachine_workspace_root }}"
    state: directory
    mode: "0755"
  when: devmachine_workspace_setup_enabled | bool

- name: Ensure per-user workspace directory exists
  ansible.builtin.file:
    path: "{{ devmachine_workspace_root }}/{{ devmachine_target_user }}"
    state: directory
    owner: "{{ devmachine_target_user }}"
    group: "{{ devmachine_effective_target_group }}"
    mode: "0755"
  when: devmachine_workspace_setup_enabled | bool

- name: Ensure workspace symlink exists in user home
  ansible.builtin.file:
    src: "{{ devmachine_workspace_root }}/{{ devmachine_target_user }}"
    dest: "{{ devmachine_effective_user_home }}/{{ devmachine_workspace_link_name }}"
    state: link
    owner: "{{ devmachine_target_user }}"
    group: "{{ devmachine_effective_target_group }}"
    force: true
  when: devmachine_workspace_setup_enabled | bool

- name: Determine effective shared workspace owner
  ansible.builtin.set_fact:
    devmachine_effective_shared_workspace_owner: >-
      {{
        devmachine_shared_workspace_owner
        if (devmachine_shared_workspace_owner | length > 0)
        else (
          devmachine_general_user
          if (devmachine_general_user_enabled | bool)
          else devmachine_target_user
        )
      }}
  when: devmachine_shared_workspace_enabled | bool

- name: Determine effective shared workspace group
  ansible.builtin.set_fact:
    devmachine_effective_shared_workspace_group: >-
      {{
        devmachine_shared_workspace_group
        if (devmachine_shared_workspace_group | length > 0)
        else devmachine_effective_target_group
      }}
  when: devmachine_shared_workspace_enabled | bool

- name: Ensure shared workspace directory exists
  ansible.builtin.file:
    path: "{{ devmachine_shared_workspace_path }}"
    state: directory
    owner: "{{ devmachine_effective_shared_workspace_owner }}"
    group: "{{ devmachine_effective_shared_workspace_group }}"
    mode: "0775"
  when: devmachine_shared_workspace_enabled | bool

- name: Ensure VS Code CLI is available
  ansible.builtin.command:
    cmd: /usr/bin/code --version
  become: true
  become_user: "{{ devmachine_target_user }}"
  environment:
    HOME: "{{ devmachine_effective_user_home }}"
  register: devmachine_vscode_cli_path
  changed_when: false
  failed_when: false

- name: Fail when VS Code CLI is unavailable
  ansible.builtin.assert:
    that:
      - devmachine_vscode_cli_path.rc == 0
    fail_msg: >-
      VS Code CLI ('code') is not available in PATH for user {{ devmachine_target_user }} after VS Code installation.
      Verify that VS Code RPM installation completed successfully and that the user's shell PATH is up to date.
    success_msg: "VS Code CLI is available."

- name: List installed VS Code extensions for target user
  ansible.builtin.command:
    cmd: code --list-extensions
  become: true
  become_user: "{{ devmachine_target_user }}"
  environment:
    HOME: "{{ devmachine_effective_user_home }}"
  register: devmachine_installed_vscode_extensions
  changed_when: false
  failed_when: false

- name: Fail when installed VS Code extensions cannot be read
  ansible.builtin.assert:
    that:
      - devmachine_installed_vscode_extensions.rc == 0
    fail_msg: >-
      Failed to list VS Code extensions for {{ devmachine_target_user }}.
      stdout={{ devmachine_installed_vscode_extensions.stdout | default('') | trim }}
      stderr={{ devmachine_installed_vscode_extensions.stderr | default('') | trim }}
    success_msg: "Installed VS Code extensions were read successfully."

- name: Normalize installed VS Code extension IDs
  ansible.builtin.set_fact:
    devmachine_installed_extensions_lowercase: "{{ devmachine_installed_vscode_extensions.stdout_lines | map('lower') | list }}"

- name: Install VS Code extensions from local VSIX packages
  ansible.builtin.command:
    cmd: "code --install-extension {{ devmachine_package_dir }}/{{ item.filename }}"
  become: true
  become_user: "{{ devmachine_target_user }}"
  environment:
    HOME: "{{ devmachine_effective_user_home }}"
  loop: "{{ devmachine_vscode_extensions }}"
  when: (item.id | lower) not in devmachine_installed_extensions_lowercase

- name: Configure npm registry to Nexus
  ansible.builtin.copy:
    dest: "{{ devmachine_effective_user_home }}/.npmrc"
    content: |
      registry={{ devmachine_npm_registry_url }}
    owner: "{{ devmachine_target_user }}"
    group: "{{ devmachine_effective_target_group }}"
    mode: "0644"

- name: Ensure pip config directory exists
  ansible.builtin.file:
    path: "{{ devmachine_effective_user_home }}/.pip"
    state: directory
    owner: "{{ devmachine_target_user }}"
    group: "{{ devmachine_effective_target_group }}"
    mode: "0755"

- name: Configure pip index to Nexus
  ansible.builtin.copy:
    dest: "{{ devmachine_effective_user_home }}/.pip/pip.conf"
    content: |
      [global]
      index-url = {{ devmachine_pip_index_url }}
    owner: "{{ devmachine_target_user }}"
    group: "{{ devmachine_effective_target_group }}"
    mode: "0644"

- name: Ensure pyenv directory exists
  ansible.builtin.file:
    path: "{{ devmachine_effective_user_home }}/.pyenv"
    state: directory
    owner: "{{ devmachine_target_user }}"
    group: "{{ devmachine_effective_target_group }}"
    mode: "0755"

- name: Configure pyenv and Nexus environment defaults
  ansible.builtin.copy:
    dest: /etc/profile.d/devmachine-nexus.sh
    mode: "0644"
    content: |
      export PYENV_ROOT="$HOME/.pyenv"
      export PATH="$PYENV_ROOT/bin:$PATH"
      export PYTHON_BUILD_MIRROR_URL="{{ devmachine_pyenv_mirror_url }}"
      export PIP_INDEX_URL="{{ devmachine_pip_index_url }}"
