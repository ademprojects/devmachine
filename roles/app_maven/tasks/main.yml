---
- name: Validate vm_owner contains exactly one user
  ansible.builtin.assert:
    that:
      - vm_owner is iterable
      - vm_owner is not string
      - vm_owner | length == 1
      - vm_owner[0] | length > 0
    fail_msg: "vm_owner must be a list with exactly one user name."

- name: Ensure Maven install base directory exists
  ansible.builtin.file:
    path: "{{ app_maven_install_base }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download and extract Maven from Nexus
  ansible.builtin.unarchive:
    src: "{{ app_maven_archive_url }}"
    dest: "{{ app_maven_install_base }}"
    remote_src: true
    owner: root
    group: root
    creates: "{{ app_maven_install_base }}/apache-maven-{{ app_maven_version }}/bin/mvn"

- name: Symlink mvn launcher
  ansible.builtin.file:
    src: "{{ app_maven_install_base }}/apache-maven-{{ app_maven_version }}/bin/mvn"
    dest: "{{ app_maven_symlink }}"
    state: link
    force: true

- name: Write Maven shell init to /etc/profile.d
  ansible.builtin.copy:
    dest: "{{ app_maven_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      export M2_HOME="{{ app_maven_install_base }}/apache-maven-{{ app_maven_version }}"
      export MAVEN_HOME="$M2_HOME"
      export PATH="$M2_HOME/bin:$PATH"

- name: Read passwd entry for vm_owner
  ansible.builtin.getent:
    database: passwd
    key: "{{ vm_owner[0] }}"

- name: Read group entries
  ansible.builtin.getent:
    database: group

- name: Resolve target user home directory
  ansible.builtin.set_fact:
    app_maven_user_home: "{{ ansible_facts.getent_passwd[vm_owner[0]][4] }}"

- name: Resolve target user primary group
  ansible.builtin.set_fact:
    app_maven_user_group: >-
      {{
        ansible_facts.getent_group
        | dict2items
        | selectattr('value.1', 'equalto', ansible_facts.getent_passwd[vm_owner[0]][2])
        | map(attribute='key')
        | first
      }}

- name: Ensure target user primary group was resolved
  ansible.builtin.assert:
    that:
      - app_maven_user_group | length > 0
    fail_msg: "Unable to resolve primary group for vm_owner {{ vm_owner[0] }}."

- name: Ensure ~vm_owner/.m2 exists
  ansible.builtin.file:
    path: "{{ app_maven_user_home }}/.m2"
    state: directory
    owner: "{{ vm_owner[0] }}"
    group: "{{ app_maven_user_group }}"
    mode: "0755"

- name: Configure ~vm_owner/.m2/settings.xml with proxy and Nexus mirror
  ansible.builtin.copy:
    dest: "{{ app_maven_user_home }}/.m2/settings.xml"
    owner: "{{ vm_owner[0] }}"
    group: "{{ app_maven_user_group }}"
    mode: "0644"
    content: |
      <?xml version="1.0" encoding="UTF-8"?>
      <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                    https://maven.apache.org/xsd/settings-1.0.0.xsd">
        <proxies>
          <proxy>
            <id>devmachine-http</id>
            <active>true</active>
            <protocol>http</protocol>
            <host>{{ app_maven_proxy_host }}</host>
            <port>{{ app_maven_proxy_port }}</port>
            <nonProxyHosts>{{ app_maven_non_proxy_hosts }}</nonProxyHosts>
          </proxy>
          <proxy>
            <id>devmachine-https</id>
            <active>true</active>
            <protocol>https</protocol>
            <host>{{ app_maven_proxy_host }}</host>
            <port>{{ app_maven_proxy_port }}</port>
            <nonProxyHosts>{{ app_maven_non_proxy_hosts }}</nonProxyHosts>
          </proxy>
        </proxies>
        <mirrors>
          <mirror>
            <id>nexus</id>
            <name>Nexus Maven Public</name>
            <url>{{ app_maven_nexus_repository }}</url>
            <mirrorOf>*</mirrorOf>
          </mirror>
        </mirrors>
      </settings>
