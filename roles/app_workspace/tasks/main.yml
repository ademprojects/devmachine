---
- name: Ensure workspace directory exists
  ansible.builtin.file:
    path: "{{ app_workspace_root }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Stat existing workspace symlink target
  ansible.builtin.stat:
    path: "{{ vm_owner_home }}/{{ app_workspace_link_name }}"
  register: app_workspace_existing_link

- name: Refuse to clobber an existing real directory at the symlink path
  ansible.builtin.fail:
    msg: >-
      {{ vm_owner_home }}/{{ app_workspace_link_name }} exists as a directory.
      Move its contents to {{ app_workspace_root }} manually and remove the directory,
      then re-run the playbook. The role will not silently replace a real directory.
  when:
    - app_workspace_existing_link.stat.exists
    - app_workspace_existing_link.stat.isdir
    - not app_workspace_existing_link.stat.islnk

- name: Ensure workspace symlink in vm_owner home
  ansible.builtin.file:
    src: "{{ app_workspace_root }}"
    dest: "{{ vm_owner_home }}/{{ app_workspace_link_name }}"
    state: link
    force: true
