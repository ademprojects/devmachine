---
- name: Install gnome-keyring + seahorse + supporting libs
  ansible.builtin.dnf:
    name: "{{ app_keyring_packages }}"
    state: present

- name: Wire pam_gnome_keyring into auth stack (captures login password)
  community.general.pamd:
    name: "{{ item }}"
    type: auth
    control: include
    module_path: password-auth
    new_type: auth
    new_control: optional
    new_module_path: pam_gnome_keyring.so
    state: after
  loop: "{{ app_keyring_pam_targets }}"

- name: Wire pam_gnome_keyring into session stack (auto-starts daemon)
  community.general.pamd:
    name: "{{ item }}"
    type: session
    control: include
    module_path: password-auth
    new_type: session
    new_control: optional
    new_module_path: pam_gnome_keyring.so
    module_arguments: auto_start
    state: after
  loop: "{{ app_keyring_pam_targets }}"

- name: Export SSH agent + askpass env for all login shells
  ansible.builtin.copy:
    dest: "{{ app_keyring_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # gnome-keyring's ssh-agent socket; unlocked at login by pam_gnome_keyring.
      if [ -n "$XDG_RUNTIME_DIR" ] && [ -S "$XDG_RUNTIME_DIR/keyring/ssh" ]; then
        export SSH_AUTH_SOCK="$XDG_RUNTIME_DIR/keyring/ssh"
      fi
      # GUI askpass helper for ssh-add when launched without a tty (e.g. from
      # XFCE autostart). SSH_ASKPASS_REQUIRE=prefer makes ssh-add use the
      # helper even when stdin is a tty, so we get the GUI prompt consistently.
      if [ -x /usr/libexec/openssh/ssh-askpass ]; then
        export SSH_ASKPASS=/usr/libexec/openssh/ssh-askpass
      fi
      export SSH_ASKPASS_REQUIRE=prefer

- name: Ensure ~/.ssh exists for vm_owner
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.ssh"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0700"

- name: Deploy passphrase-encrypted private SSH key for vm_owner
  ansible.builtin.copy:
    content: "{{ vm_owner_ssh_privkey }}"
    dest: "{{ vm_owner_home }}/.ssh/{{ vm_owner_ssh_keyfilename }}"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0600"
  when: vm_owner_ssh_privkey | length > 0
  no_log: true

- name: Deploy public SSH key for vm_owner
  ansible.builtin.copy:
    content: "{{ vm_owner_ssh_pubkey }}"
    dest: "{{ vm_owner_home }}/.ssh/{{ vm_owner_ssh_keyfilename }}.pub"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
  when: vm_owner_ssh_pubkey | length > 0

- name: Report missing user SSH key in user_data
  ansible.builtin.debug:
    msg: >-
      No ssh_privkey set for {{ vm_owner_name }} in user_data;
      they need to drop a key into ~/.ssh/ manually after first login.
  when: vm_owner_ssh_privkey | length == 0

- name: Configure ~/.ssh/config to auto-add unlocked keys to the agent
  ansible.builtin.blockinfile:
    path: "{{ vm_owner_home }}/.ssh/config"
    create: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED — app_keyring"
    block: |
      Host *
          AddKeysToAgent yes

# Per-host ProxyCommand for git servers reachable only via HTTPS-CONNECT
# tunnel (corp firewall blocks outbound port 22). socat -> Proxy -> Target:22.
# Configure via vm_owner_ssh_proxy_hosts in host_vars or group_vars, e.g.:
#   vm_owner_ssh_proxy_hosts:
#     - host: gitlab.firma.intern
#     - host: github.com
#       hostname: ssh.github.com
#       port: 443
- name: Add ProxyCommand entries to ~/.ssh/config for hosts behind HTTPS proxy
  vars:
    ph: "{{ item.proxy_host | default(proxy_fqdn) }}"
    pp: "{{ item.proxy_port | default(proxy_port) }}"
  ansible.builtin.blockinfile:
    path: "{{ vm_owner_home }}/.ssh/config"
    create: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED — proxy {{ item.host }}"
    block: |
      Host {{ item.host }}
          HostName {{ item.hostname | default(item.host) }}
          Port {{ item.port | default(22) }}
          User {{ item.user | default('git') }}
          ProxyCommand socat - PROXY:{{ ph }}:%h:%p,proxyport={{ pp }}
          IdentityFile ~/.ssh/{{ vm_owner_ssh_keyfilename }}
          IdentitiesOnly yes
  loop: "{{ vm_owner_ssh_proxy_hosts | default([]) }}"
  loop_control:
    label: "{{ item.host }}"
