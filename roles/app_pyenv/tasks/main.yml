---
- name: Install pyenv build dependencies (gcc, make, *-devel for Python source build)
  ansible.builtin.dnf:
    name: "{{ app_pyenv_build_dependencies }}"
    state: present

- name: Ensure pyenv install parent directory exists
  ansible.builtin.file:
    path: "{{ app_pyenv_install_dir | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure pyenv install directory exists
  ansible.builtin.file:
    path: "{{ app_pyenv_install_dir }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Install pyenv from Nexus tarball
  ansible.builtin.unarchive:
    src: "{{ app_pyenv_archive_url }}"
    dest: "{{ app_pyenv_install_dir }}"
    remote_src: true
    extra_opts:
      - --strip-components=1
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    creates: "{{ app_pyenv_install_dir }}/bin/pyenv"

- name: Stat existing ~/.pyenv path
  ansible.builtin.stat:
    path: "{{ vm_owner_home }}/{{ app_pyenv_install_subdir }}"
  register: app_pyenv_home_link

- name: Refuse to clobber an existing real ~/.pyenv directory
  ansible.builtin.fail:
    msg: >-
      {{ vm_owner_home }}/{{ app_pyenv_install_subdir }} exists as a real directory.
      Move its contents to {{ app_pyenv_install_dir }} manually and remove the directory,
      then re-run the playbook. The role will not silently replace a real directory.
  when:
    - app_pyenv_home_link.stat.exists
    - app_pyenv_home_link.stat.isdir
    - not app_pyenv_home_link.stat.islnk

- name: Symlink ~/.pyenv to data-disk install
  ansible.builtin.file:
    src: "{{ app_pyenv_install_dir }}"
    dest: "{{ vm_owner_home }}/{{ app_pyenv_install_subdir }}"
    state: link
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    force: true

- name: Write pyenv shell init to /etc/profile.d
  ansible.builtin.copy:
    dest: "{{ app_pyenv_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      if [ -x "$HOME/{{ app_pyenv_install_subdir }}/bin/pyenv" ]; then
        export PYENV_ROOT="$HOME/{{ app_pyenv_install_subdir }}"
        export PATH="$PYENV_ROOT/bin:$PATH"
        export PYTHON_BUILD_MIRROR_URL="{{ app_pyenv_python_build_mirror_url }}"
        eval "$($PYENV_ROOT/bin/pyenv init -)"
      fi

- name: Resolve latest stable Python 3 version via pyenv
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      "{{ app_pyenv_install_dir }}/bin/pyenv" install --list \
        | sed 's/^[[:space:]]*//' \
        | grep -E '^3\.[0-9]+\.[0-9]+$' \
        | tail -1
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    PYENV_ROOT: "{{ app_pyenv_install_dir }}"
    HTTP_PROXY: "{{ app_pyenv_proxy_url }}"
    HTTPS_PROXY: "{{ app_pyenv_proxy_url }}"
    http_proxy: "{{ app_pyenv_proxy_url }}"
    https_proxy: "{{ app_pyenv_proxy_url }}"
  register: app_pyenv_latest_python
  changed_when: false
  when: app_pyenv_python_version | length == 0

- name: Determine target Python version
  ansible.builtin.set_fact:
    app_pyenv_target_python: >-
      {{
        app_pyenv_python_version
        if (app_pyenv_python_version | length > 0)
        else (app_pyenv_latest_python.stdout | trim)
      }}

- name: Assert target Python version was resolved
  ansible.builtin.assert:
    that:
      - app_pyenv_target_python | length > 0
      - app_pyenv_target_python is match('^\d+\.\d+\.\d+$')
    fail_msg: "Could not resolve a Python version to install (got '{{ app_pyenv_target_python }}')."

- name: Install target Python via pyenv (build from source through Nexus mirror)
  ansible.builtin.command:
    cmd: "{{ app_pyenv_install_dir }}/bin/pyenv install --skip-existing {{ app_pyenv_target_python }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    PYENV_ROOT: "{{ app_pyenv_install_dir }}"
    PYTHON_BUILD_MIRROR_URL: "{{ app_pyenv_python_build_mirror_url }}"
    HTTP_PROXY: "{{ app_pyenv_proxy_url }}"
    HTTPS_PROXY: "{{ app_pyenv_proxy_url }}"
    http_proxy: "{{ app_pyenv_proxy_url }}"
    https_proxy: "{{ app_pyenv_proxy_url }}"
  register: app_pyenv_install_result
  changed_when: "'Installed Python-' in app_pyenv_install_result.stdout"

- name: Set installed Python as global default for vm_owner
  ansible.builtin.command:
    cmd: "{{ app_pyenv_install_dir }}/bin/pyenv global {{ app_pyenv_target_python }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    PYENV_ROOT: "{{ app_pyenv_install_dir }}"
  changed_when: false

- name: Ensure pip config directory exists for vm_owner
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.pip"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Configure pip index to Nexus for vm_owner
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.pip/pip.conf"
    content: |
      [global]
      index-url = {{ app_pyenv_pip_index_url }}
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
