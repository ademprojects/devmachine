---
- name: Install pyenv build dependencies (gcc, make, *-devel for Python source build)
  ansible.builtin.dnf:
    name: "{{ app_pyenv_build_dependencies }}"
    state: present

- name: Ensure pyenv install parent directory exists
  ansible.builtin.file:
    path: "{{ app_pyenv_install_dir | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure pyenv install directory exists
  ansible.builtin.file:
    path: "{{ app_pyenv_install_dir }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Discover pyenv tarball in role files
  ansible.builtin.set_fact:
    app_pyenv_tarball_files: >-
      {{
        query('fileglob', role_path ~ '/files/pyenv-*.tar.gz')
        | map('basename')
        | sort
      }}

- name: Fail when no pyenv tarball is present in role files
  ansible.builtin.fail:
    msg: >-
      No pyenv tarball found in roles/app_pyenv/files/.
      Run `tools/download-tools.sh` on the controller to fetch the latest one.
  when: app_pyenv_tarball_files | length == 0
  run_once: true

- name: Fail when more than one pyenv tarball is present
  ansible.builtin.fail:
    msg: >-
      Multiple pyenv tarballs found in roles/app_pyenv/files/
      ({{ app_pyenv_tarball_files | join(', ') }}). Keep only one.
  when: app_pyenv_tarball_files | length > 1
  run_once: true

- name: Install pyenv from local tarball
  ansible.builtin.unarchive:
    src: "{{ app_pyenv_tarball_files[0] }}"
    dest: "{{ app_pyenv_install_dir }}"
    extra_opts:
      - --strip-components=1
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    creates: "{{ app_pyenv_install_dir }}/bin/pyenv"

- name: Stat existing ~/.pyenv path
  ansible.builtin.stat:
    path: "{{ vm_owner_home }}/{{ app_pyenv_install_subdir }}"
  register: app_pyenv_home_link

- name: Refuse to clobber an existing real ~/.pyenv directory
  ansible.builtin.fail:
    msg: >-
      {{ vm_owner_home }}/{{ app_pyenv_install_subdir }} exists as a real directory.
      Move its contents to {{ app_pyenv_install_dir }} manually and remove the directory,
      then re-run the playbook. The role will not silently replace a real directory.
  when:
    - app_pyenv_home_link.stat.exists
    - app_pyenv_home_link.stat.isdir
    - not app_pyenv_home_link.stat.islnk

- name: Symlink ~/.pyenv to data-disk install
  ansible.builtin.file:
    src: "{{ app_pyenv_install_dir }}"
    dest: "{{ vm_owner_home }}/{{ app_pyenv_install_subdir }}"
    state: link
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    force: true

- name: Write pyenv shell init to /etc/profile.d
  ansible.builtin.copy:
    dest: "{{ app_pyenv_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      if [ -x "$HOME/{{ app_pyenv_install_subdir }}/bin/pyenv" ]; then
        export PYENV_ROOT="$HOME/{{ app_pyenv_install_subdir }}"
        export PATH="$PYENV_ROOT/bin:$PATH"
        export PYTHON_BUILD_MIRROR_URL="{{ app_pyenv_python_build_mirror_url }}"
        eval "$($PYENV_ROOT/bin/pyenv init -)"
      fi

- name: Discover bundled CPython source tarballs in role files
  ansible.builtin.set_fact:
    app_pyenv_python_tarball_files: >-
      {{ query('fileglob', role_path ~ '/files/Python-*.tar.xz')
         | map('basename') | sort | list }}

- name: Assert every requested CPython version is bundled
  ansible.builtin.assert:
    that:
      - ('Python-' ~ item ~ '.tar.xz') in app_pyenv_python_tarball_files
    fail_msg: >-
      Python-{{ item }}.tar.xz not in roles/app_pyenv/files/.
      Run `PYTHON_VERSIONS="{{ app_pyenv_python_versions | join(' ') }}" tools/download-tools.sh`
      on the controller. Bundled versions:
      {{ app_pyenv_python_tarball_files | join(', ') | default('none', true) }}.
  loop: "{{ app_pyenv_python_versions }}"
  loop_control:
    label: "{{ item }}"

- name: Ensure pyenv cache directory exists
  ansible.builtin.file:
    path: "{{ app_pyenv_install_dir }}/cache"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

# Pre-seed python-build's cache so `pyenv install` skips its HTTP fetch.
# python-build verifies SHA256 against its recipe — python.org tarballs
# always match, so this is a no-op on repeat runs (force: false also keeps
# it idempotent).
- name: Pre-populate pyenv cache with bundled CPython source tarballs
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ app_pyenv_install_dir }}/cache/{{ item }}"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
    force: false
  loop: "{{ app_pyenv_python_tarball_files }}"
  loop_control:
    label: "{{ item }}"

- name: Install requested Python versions via pyenv (uses pre-cached tarballs)
  ansible.builtin.command:
    cmd: "{{ app_pyenv_install_dir }}/bin/pyenv install --skip-existing {{ item }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    PYENV_ROOT: "{{ app_pyenv_install_dir }}"
    PYTHON_BUILD_MIRROR_URL: "{{ app_pyenv_python_build_mirror_url }}"
    HTTP_PROXY: "{{ app_pyenv_proxy_url }}"
    HTTPS_PROXY: "{{ app_pyenv_proxy_url }}"
    http_proxy: "{{ app_pyenv_proxy_url }}"
    https_proxy: "{{ app_pyenv_proxy_url }}"
  loop: "{{ app_pyenv_python_versions }}"
  loop_control:
    label: "{{ item }}"
  register: app_pyenv_install_results
  changed_when: "'Installed Python-' in (app_pyenv_install_results.stdout | default(''))"

- name: Set default Python version as global for vm_owner
  ansible.builtin.command:
    cmd: "{{ app_pyenv_install_dir }}/bin/pyenv global {{ app_pyenv_python_default }}"
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    PYENV_ROOT: "{{ app_pyenv_install_dir }}"
  changed_when: false

- name: Ensure pip config directory exists for vm_owner
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.pip"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Configure pip index to Nexus for vm_owner
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.pip/pip.conf"
    content: |
      [global]
      index-url = {{ app_pyenv_pip_index_url }}
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
