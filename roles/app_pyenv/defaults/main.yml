---
# Pyenv is a shell tool, not a PyPI package. The tarball is fetched on the
# controller by tools/download-tools.sh and lands in roles/app_pyenv/files/
# as pyenv-<version>.tar.gz; the role auto-discovers whichever version is
# there (matches the Postman/Nextcloud/KeePassXC pattern).
app_pyenv_install_subdir: .pyenv
# Pyenv lives on the data disk (Python builds + installed versions can grow large).
# A symlink {{ vm_owner_home }}/.pyenv → app_pyenv_install_dir keeps tooling that
# assumes ~/.pyenv (incl. profile.d's $HOME/.pyenv check) working transparently.
app_pyenv_install_dir: "{{ common_storage_mount_point | default('/mnt/data') }}/pyenv/{{ vm_owner_name }}"
app_pyenv_python_build_mirror_url: "{{ devmachine_nexus_base_url }}/pyenv-mirror/"
app_pyenv_profile_path: /etc/profile.d/app-pyenv.sh
app_pyenv_python_version: "3.14.5"
app_pyenv_proxy_url: "{{ devmachine_proxy_url }}"
app_pyenv_pip_index_url: "{{ devmachine_pip_index_url }}"
app_pyenv_build_dependencies:
  - gcc
  - make
  - openssl-devel
  - bzip2-devel
  - libffi-devel
  - zlib-devel
  - readline-devel
  - sqlite-devel
  - xz-devel
