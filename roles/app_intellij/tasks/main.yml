---
- name: Ensure IntelliJ package directory exists
  ansible.builtin.file:
    path: "{{ app_intellij_package_dir }}"
    state: directory
    mode: "0755"

- name: Check IntelliJ archive presence in role files
  ansible.builtin.stat:
    path: "{{ role_path }}/files/{{ app_intellij_archive }}"
  register: app_intellij_archive_local_stat
  delegate_to: localhost
  become: false
  run_once: true

- name: Fail when IntelliJ archive is missing from role files
  ansible.builtin.fail:
    msg: "IntelliJ archive not found at {{ role_path }}/files/{{ app_intellij_archive }}"
  when: not app_intellij_archive_local_stat.stat.exists
  run_once: true

- name: Copy IntelliJ archive to remote host
  ansible.builtin.copy:
    src: "{{ app_intellij_archive }}"
    dest: "{{ app_intellij_package_dir }}/{{ app_intellij_archive }}"
    mode: "0644"

- name: Read IntelliJ archive checksum when provided
  ansible.builtin.stat:
    path: "{{ app_intellij_package_dir }}/{{ app_intellij_archive }}"
    checksum_algorithm: sha256
  register: app_intellij_archive_checksum_stat
  when: app_intellij_sha256 | length > 0

- name: Assert IntelliJ archive checksum matches expected value
  ansible.builtin.assert:
    that:
      - app_intellij_archive_checksum_stat.stat.checksum == app_intellij_sha256
    fail_msg: "IntelliJ archive checksum mismatch for {{ app_intellij_archive }}"
  when: app_intellij_sha256 | length > 0

- name: Ensure IntelliJ install directory exists
  ansible.builtin.file:
    path: "{{ app_intellij_install_dir }}"
    state: directory
    mode: "0755"

# Idempotency: look up the tarball's top-level directory (e.g.
# idea-IU-262.5752.32) and use it as the unarchive `creates` guard so the
# extract is a no-op once that dir is present. Old idea-* dirs that don't
# match the current archive get wiped — current one is preserved.
- name: Resolve IntelliJ tarball top-level directory name
  ansible.builtin.shell:
    cmd: >-
      tar -tzf {{ (app_intellij_package_dir ~ '/' ~ app_intellij_archive) | quote }} 2>/dev/null
      | head -1 | cut -d/ -f1
  register: app_intellij_archive_topdir
  changed_when: false

- name: Assert IntelliJ archive top-level directory was resolved
  ansible.builtin.assert:
    that:
      - (app_intellij_archive_topdir.stdout | trim) | length > 0
    fail_msg: >-
      Could not determine top-level directory of {{ app_intellij_archive }}
      under {{ app_intellij_package_dir }}; tarball may be missing or corrupt.

- name: Find existing IntelliJ directories
  ansible.builtin.find:
    paths: "{{ app_intellij_install_dir }}"
    file_type: directory
    patterns: "idea-*"
    recurse: false
  register: app_intellij_existing_dirs

- name: Remove stale IntelliJ directories (not matching the current archive)
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ app_intellij_existing_dirs.files }}"
  loop_control:
    label: "{{ item.path }}"
  when: (item.path | basename) != (app_intellij_archive_topdir.stdout | trim)

- name: Extract IntelliJ archive
  ansible.builtin.unarchive:
    src: "{{ app_intellij_package_dir }}/{{ app_intellij_archive }}"
    dest: "{{ app_intellij_install_dir }}"
    remote_src: true
    creates: "{{ app_intellij_install_dir }}/{{ app_intellij_archive_topdir.stdout | trim }}"

- name: Find extracted IntelliJ directory
  ansible.builtin.find:
    paths: "{{ app_intellij_install_dir }}"
    file_type: directory
    patterns: "idea-*"
    recurse: false
  register: app_intellij_extracted_dirs

- name: Fail when IntelliJ extraction did not produce expected directory
  ansible.builtin.fail:
    msg: "No extracted IntelliJ directory found in {{ app_intellij_install_dir }}"
  when: app_intellij_extracted_dirs.matched | int == 0

- name: Resolve IntelliJ home
  ansible.builtin.set_fact:
    app_intellij_home: "{{ app_intellij_extracted_dirs.files[0].path }}"

- name: Symlink IntelliJ launcher
  ansible.builtin.file:
    src: "{{ app_intellij_home }}/bin/idea.sh"
    dest: "{{ app_intellij_symlink }}"
    state: link
    force: true

# Resolve the per-version config dir name (e.g. "IntelliJIdea2026.1") from
# product-info.json — IntelliJ 2020+ reads user-installed plugins from
# $XDG_DATA_HOME/JetBrains/<data_dir>/plugins/, NOT from <IDE>/plugins/
# (which is reserved for bundled plugins). dataDirectoryName is the
# canonical source IntelliJ itself uses.
- name: Read IntelliJ product-info.json
  ansible.builtin.slurp:
    src: "{{ app_intellij_home }}/product-info.json"
  register: app_intellij_product_info_raw

- name: Resolve IntelliJ data directory name
  ansible.builtin.set_fact:
    app_intellij_data_dir_name: >-
      {{ (app_intellij_product_info_raw.content | b64decode | from_json).dataDirectoryName }}

- name: Resolve per-user IntelliJ plugins directory
  ansible.builtin.set_fact:
    app_intellij_user_plugins_dir: "{{ vm_owner_home }}/.local/share/JetBrains/{{ app_intellij_data_dir_name | trim }}/plugins"

# ~/.local and ~/.cache are already symlinked to /mnt/data by app_workspace,
# so JetBrains state (plugins under .local/share/JetBrains, indexes under
# .cache/JetBrains) automatically lands on the data disk via those parent
# symlinks. No JetBrains-specific symlinks needed here.

- name: Discover IntelliJ plugin files in role files
  ansible.builtin.set_fact:
    app_intellij_plugin_files: >-
      {{
        query('fileglob', role_path ~ '/files/' ~ app_intellij_plugins_subdir ~ '/*')
        | map('basename')
        | reject('match', '^\\.')
        | sort
      }}

- name: Report discovered IntelliJ plugins
  ansible.builtin.debug:
    msg: >-
      Found {{ app_intellij_plugin_files | length }} IntelliJ plugin file(s) under
      roles/app_intellij/files/{{ app_intellij_plugins_subdir }}/; deploying to
      {{ app_intellij_user_plugins_dir }}.

- name: Ensure per-user IntelliJ plugins directory exists
  ansible.builtin.file:
    path: "{{ app_intellij_user_plugins_dir }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

# Resolve the top-level directory of each ZIP plugin on the controller so
# we can give `unarchive` a `creates:` guard — without it, ansible always
# reports "changed" for ZIPs whose archive entries don't have a separate
# top-level dir record (go-plugin, JPA Buddy, makefile, …).
- name: Resolve top-level dir of each IntelliJ ZIP plugin (controller-side)
  ansible.builtin.command:
    cmd: "unzip -Z -1 {{ role_path }}/files/{{ app_intellij_plugins_subdir }}/{{ item }}"
  register: app_intellij_plugin_zip_listings
  changed_when: false
  delegate_to: localhost
  become: false
  loop: "{{ app_intellij_plugin_files | select('match', '.*\\.zip$') | list }}"
  loop_control:
    label: "{{ item }}"

- name: Extract IntelliJ ZIP plugins into the user plugins dir
  ansible.builtin.unarchive:
    src: "{{ app_intellij_plugins_subdir }}/{{ item.item }}"
    dest: "{{ app_intellij_user_plugins_dir }}"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    creates: "{{ app_intellij_user_plugins_dir }}/{{ item.stdout_lines | first | split('/') | first }}"
  loop: "{{ app_intellij_plugin_zip_listings.results }}"
  loop_control:
    label: "{{ item.item }} -> {{ item.stdout_lines | first | split('/') | first }}"

- name: Install IntelliJ JAR plugins into the user plugins dir
  ansible.builtin.copy:
    src: "{{ app_intellij_plugins_subdir }}/{{ item }}"
    dest: "{{ app_intellij_user_plugins_dir }}/{{ item }}"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
  loop: "{{ app_intellij_plugin_files | select('match', '.*\\.jar$') | list }}"
  loop_control:
    label: "{{ item }}"

# JetBrains tarballs ship the launcher icon at <home>/bin/idea.{png,svg}. Drop
# it into the hicolor theme so the .desktop Icon= name resolves consistently
# in the XFCE menu + on the desktop.
- name: Locate IntelliJ icons in extracted tarball
  ansible.builtin.find:
    paths: "{{ app_intellij_home }}/bin"
    patterns: 'idea*.svg,idea*.png'
    file_type: file
  register: app_intellij_found_icons

- name: Assert IntelliJ icon was discovered
  ansible.builtin.assert:
    that: app_intellij_found_icons.files | length > 0
    fail_msg: "No idea*.png/idea*.svg found under {{ app_intellij_home }}/bin/ — tarball layout may have changed."

- name: Pick IntelliJ icon source (SVG preferred, else largest PNG)
  ansible.builtin.set_fact:
    app_intellij_icon_src: >-
      {{
        (app_intellij_found_icons.files | selectattr('path', 'search', '\\.svg$') | list | first)
        | default(app_intellij_found_icons.files | sort(attribute='size', reverse=true) | first)
      }}

- name: Install IntelliJ icon into hicolor theme
  ansible.builtin.copy:
    src: "{{ app_intellij_icon_src.path }}"
    dest: >-
      /usr/share/icons/hicolor/{{ 'scalable' if app_intellij_icon_src.path is search('\\.svg$') else '256x256' }}/apps/{{
      app_intellij_desktop_icon }}.{{ 'svg' if app_intellij_icon_src.path is search('\\.svg$') else 'png' }}
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: Refresh GTK icon cache for hicolor theme
  ansible.builtin.command:
    cmd: gtk-update-icon-cache -f -t /usr/share/icons/hicolor
  changed_when: false
  failed_when: false

- name: Write IntelliJ desktop entry
  ansible.builtin.copy:
    dest: "{{ app_intellij_desktop_entry }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=IntelliJ IDEA
      GenericName=Java IDE
      Comment=The Drive to Develop
      Exec={{ app_intellij_symlink }} %f
      Icon={{ app_intellij_desktop_icon }}
      Terminal=false
      Categories=Development;IDE;
      StartupWMClass=jetbrains-idea
      MimeType=application/x-java;

- name: Ensure ~vm_owner/Desktop exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/Desktop"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Copy IntelliJ desktop entry to vm_owner's Desktop
  ansible.builtin.copy:
    src: "{{ app_intellij_desktop_entry }}"
    dest: "{{ vm_owner_home }}/Desktop/{{ app_intellij_desktop_entry | basename }}"
    remote_src: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
