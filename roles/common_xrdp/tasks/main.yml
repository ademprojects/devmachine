---
- name: Install XFCE desktop packages
  ansible.builtin.dnf:
    name: "{{ common_xrdp_xfce_packages }}"
    state: present

- name: Install xrdp packages
  ansible.builtin.dnf:
    name: "{{ common_xrdp_packages }}"
    state: present

- name: Apply xrdp.ini settings
  ansible.builtin.ini_file:
    path: /etc/xrdp/xrdp.ini
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
    state: present
  loop: "{{ common_xrdp_ini_entries }}"
  notify: Restart xrdp

- name: Apply sesman.ini settings
  ansible.builtin.ini_file:
    path: /etc/xrdp/sesman.ini
    section: "{{ item.section }}"
    option: "{{ item.option }}"
    value: "{{ item.value }}"
    owner: root
    group: root
    mode: "0644"
    backup: true
    state: present
  loop: "{{ common_xrdp_sesman_ini_entries }}"
  notify: Restart xrdp

- name: Configure .xsession for vm_owner to launch XFCE
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.xsession"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
    content: |
      #!/bin/sh
      exec {{ common_xrdp_xsession_command }}

- name: Configure .Xclients for vm_owner to launch XFCE
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.Xclients"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
    content: |
      #!/bin/sh
      exec {{ common_xrdp_xsession_command }}

- name: Configure /etc/skel/.xsession default for new users
  ansible.builtin.copy:
    dest: /etc/skel/.xsession
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/sh
      exec {{ common_xrdp_xsession_command }}
  when: common_xrdp_skel_enabled | bool

- name: Configure /etc/skel/.Xclients default for new users
  ansible.builtin.copy:
    dest: /etc/skel/.Xclients
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/sh
      exec {{ common_xrdp_xsession_command }}
  when: common_xrdp_skel_enabled | bool

- name: Restore SELinux contexts on xrdp paths
  ansible.builtin.command:
    cmd: restorecon -RvF /etc/xrdp /usr/sbin/xrdp /usr/sbin/xrdp-sesman
  register: common_xrdp_restorecon
  changed_when: common_xrdp_restorecon.stdout | length > 0
  failed_when: false
  when: common_xrdp_selinux_restorecon | bool

- name: Enable and start xrdp service
  ansible.builtin.systemd:
    name: "{{ common_xrdp_service_name }}"
    enabled: true
    state: started

- name: Gather service facts
  ansible.builtin.service_facts:
  when: common_xrdp_open_firewall | bool

- name: Open xrdp port in firewalld
  ansible.posix.firewalld:
    port: "{{ common_xrdp_firewall_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  when:
    - common_xrdp_open_firewall | bool
    - (ansible_facts.services['firewalld.service'].state | default('')) == 'running'

# XFCE 4.18+ refuses to run ~/Desktop/*.desktop without the gio
# `metadata::trusted` attribute — every app icon prompts "the location is
# not trusted" until the user right-clicks each one. Dropped here as a
# one-shot autostart because setting the attribute via `gio set` needs an
# active user session (DBus), which Ansible doesn't have at provisioning
# time. The script self-removes after the first login.

- name: Ensure ~vm_owner/.local/bin exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.local/bin"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Ensure ~vm_owner/.config/autostart exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/.config/autostart"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Deploy first-login script to mark Desktop launchers as trusted
  ansible.builtin.template:
    src: devmachine-trust-desktop.sh.j2
    dest: "{{ vm_owner_home }}/.local/bin/devmachine-trust-desktop.sh"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Deploy autostart entry for trust-desktop script
  ansible.builtin.template:
    src: devmachine-trust-desktop.desktop.j2
    dest: "{{ vm_owner_home }}/.config/autostart/devmachine-trust-desktop.desktop"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"

# Same pattern: drop a one-shot autostart that adds launchers (Chrome,
# VS Code, IntelliJ, KeePassXC) to the bottom XFCE panel via xfconf-query,
# then removes itself. Sentinel in ~/.cache/ prevents re-running on later
# sessions even if the autostart file lingers.

- name: Deploy first-login script to add launchers to the XFCE panel
  ansible.builtin.template:
    src: devmachine-setup-panel.sh.j2
    dest: "{{ vm_owner_home }}/.local/bin/devmachine-setup-panel.sh"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Deploy autostart entry for panel-setup script
  ansible.builtin.template:
    src: devmachine-setup-panel.desktop.j2
    dest: "{{ vm_owner_home }}/.config/autostart/devmachine-setup-panel.desktop"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
