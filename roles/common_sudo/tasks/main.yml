---
- name: Configure passwordless sudo for vm_owner
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ vm_owner_name }}"
    content: "{{ vm_owner_name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: root
    group: root
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  when: common_sudo_nopasswd | bool
