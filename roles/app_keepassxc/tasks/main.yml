---
- name: Discover KeePassXC AppImage in role files
  ansible.builtin.set_fact:
    app_keepassxc_appimage_files: >-
      {{
        query('fileglob', role_path ~ '/files/KeePassXC-*-x86_64.AppImage')
        | map('basename')
        | sort
      }}

- name: Fail when no KeePassXC AppImage is present in role files
  ansible.builtin.fail:
    msg: >-
      No KeePassXC AppImage found in roles/app_keepassxc/files/.
      Run `tools/download-tools.sh` on the controller to fetch the latest one.
  when: app_keepassxc_appimage_files | length == 0
  run_once: true

- name: Fail when more than one KeePassXC AppImage is present
  ansible.builtin.fail:
    msg: >-
      Multiple KeePassXC AppImages found in roles/app_keepassxc/files/
      ({{ app_keepassxc_appimage_files | join(', ') }}). Keep only one.
  when: app_keepassxc_appimage_files | length > 1
  run_once: true

- name: Install AppImage runtime dependencies (FUSE2)
  ansible.builtin.dnf:
    name: "{{ app_keepassxc_runtime_packages }}"
    state: present

- name: Ensure KeePassXC install directory exists
  ansible.builtin.file:
    path: "{{ app_keepassxc_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Copy KeePassXC AppImage to remote host
  ansible.builtin.copy:
    src: "{{ app_keepassxc_appimage_files[0] }}"
    dest: "{{ app_keepassxc_install_dir }}/{{ app_keepassxc_appimage_files[0] }}"
    owner: root
    group: root
    mode: "0755"

# Same icon-extraction flow as app_nextcloud — see comments there.
- name: Create tempdir for KeePassXC AppImage extraction
  ansible.builtin.tempfile:
    state: directory
    prefix: keepassxc-extract-
  register: app_keepassxc_extract_tmp
  changed_when: false

- name: Extract KeePassXC AppImage in tempdir
  ansible.builtin.command:
    cmd: "{{ app_keepassxc_install_dir }}/{{ app_keepassxc_appimage_files[0] }} --appimage-extract"
    chdir: "{{ app_keepassxc_extract_tmp.path }}"
  changed_when: false

- name: Check whether AppImage carries a hicolor icon tree
  ansible.builtin.stat:
    path: "{{ app_keepassxc_extract_tmp.path }}/squashfs-root/usr/share/icons/hicolor"
  register: app_keepassxc_hicolor_stat

- name: Install KeePassXC hicolor icons system-wide
  ansible.builtin.copy:
    src: "{{ app_keepassxc_extract_tmp.path }}/squashfs-root/usr/share/icons/hicolor/"
    dest: /usr/share/icons/hicolor/
    remote_src: true
    owner: root
    group: root
    mode: preserve
  when: app_keepassxc_hicolor_stat.stat.exists

- name: Locate top-level AppImage icon (fallback when no hicolor tree)
  ansible.builtin.find:
    paths: "{{ app_keepassxc_extract_tmp.path }}/squashfs-root"
    patterns: '*.png,*.svg'
    file_type: file
    recurse: false
  register: app_keepassxc_toplevel_icons
  when: not app_keepassxc_hicolor_stat.stat.exists

- name: Install KeePassXC top-level icon as 256x256 (fallback)
  ansible.builtin.copy:
    src: "{{ app_keepassxc_toplevel_icons.files[0].path }}"
    dest: "/usr/share/icons/hicolor/256x256/apps/{{ app_keepassxc_icon_name }}.png"
    remote_src: true
    owner: root
    group: root
    mode: "0644"
  when:
    - not app_keepassxc_hicolor_stat.stat.exists
    - app_keepassxc_toplevel_icons.files | length > 0

- name: Refresh GTK icon cache for hicolor theme
  ansible.builtin.command:
    cmd: gtk-update-icon-cache -f -t /usr/share/icons/hicolor
  changed_when: false
  failed_when: false

- name: Remove KeePassXC AppImage extraction tempdir
  ansible.builtin.file:
    path: "{{ app_keepassxc_extract_tmp.path }}"
    state: absent
  changed_when: false

- name: Symlink KeePassXC launcher
  ansible.builtin.file:
    src: "{{ app_keepassxc_install_dir }}/{{ app_keepassxc_appimage_files[0] }}"
    dest: "{{ app_keepassxc_symlink }}"
    state: link
    force: true

- name: Write KeePassXC desktop entry
  ansible.builtin.copy:
    dest: "{{ app_keepassxc_desktop_entry }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      [Desktop Entry]
      Type=Application
      Name=KeePassXC
      GenericName=Password Manager
      Comment=Cross-platform community-driven port of the Windows application "Keepass Password Safe"
      Exec={{ app_keepassxc_symlink }} %f
      Icon=keepassxc
      Terminal=false
      Categories=Utility;Security;Qt;
      MimeType=application/x-keepass2;
      StartupWMClass=keepassxc

- name: Ensure ~vm_owner/Desktop exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/Desktop"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Copy KeePassXC desktop entry to vm_owner's Desktop
  ansible.builtin.copy:
    src: "{{ app_keepassxc_desktop_entry }}"
    dest: "{{ vm_owner_home }}/Desktop/{{ app_keepassxc_desktop_entry | basename }}"
    remote_src: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
