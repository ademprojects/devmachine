---
# AppImage-based install — drop the latest KeePassXC-*-x86_64.AppImage into
# roles/app_keepassxc/files/ (use tools/download-tools.sh on the controller).
app_keepassxc_install_dir: "{{ common_storage_mount_point | default('/mnt/data') }}/apps/keepassxc"
app_keepassxc_symlink: /usr/local/bin/keepassxc
app_keepassxc_desktop_entry: /usr/share/applications/keepassxc.desktop
app_keepassxc_runtime_packages:
  - fuse
  - fuse-libs
# Name used by the .desktop file's Icon= line and as the fallback filename
# when the AppImage doesn't ship a hicolor icon tree.
app_keepassxc_icon_name: keepassxc
