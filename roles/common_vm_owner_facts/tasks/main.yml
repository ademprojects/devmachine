---
# Resolves play-level facts about the target user named by vm_owner[0]:
#   vm_owner_name  — the user name string
#   vm_owner_uid   — numeric uid
#   vm_owner_gid   — numeric primary gid
#   vm_owner_home  — home directory path
#   vm_owner_group — primary group name
# Consumer roles can rely on these without re-running getent themselves.

- name: Validate vm_owner contains exactly one user
  ansible.builtin.assert:
    that:
      - vm_owner is iterable
      - vm_owner is not string
      - vm_owner | length == 1
      - vm_owner[0] | length > 0
    fail_msg: "vm_owner must be a list with exactly one user name."

- name: Read passwd entry for vm_owner
  ansible.builtin.getent:
    database: passwd
    key: "{{ vm_owner[0] }}"

- name: Read group entries
  ansible.builtin.getent:
    database: group

- name: Resolve vm_owner facts
  ansible.builtin.set_fact:
    vm_owner_name: "{{ vm_owner[0] }}"
    vm_owner_uid: "{{ ansible_facts.getent_passwd[vm_owner[0]][1] }}"
    vm_owner_gid: "{{ ansible_facts.getent_passwd[vm_owner[0]][2] }}"
    vm_owner_home: "{{ ansible_facts.getent_passwd[vm_owner[0]][4] }}"
    vm_owner_group: >-
      {{
        ansible_facts.getent_group
        | dict2items
        | selectattr('value.1', 'equalto', ansible_facts.getent_passwd[vm_owner[0]][2])
        | map(attribute='key')
        | first
      }}

- name: Ensure vm_owner primary group was resolved
  ansible.builtin.assert:
    that:
      - vm_owner_group | length > 0
    fail_msg: "Unable to resolve primary group for vm_owner {{ vm_owner[0] }}."
