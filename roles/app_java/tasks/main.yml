---
- name: Auto-include OpenJDK 25 and set as default on RHEL 9.7+
  ansible.builtin.set_fact:
    app_java_packages: "{{ (['java-25-openjdk-devel'] + app_java_packages) | unique }}"
    app_java_default_version: "25"
  when:
    - app_java_auto_include_25 | bool
    - ansible_facts.distribution_version is version('9.7', '>=')

- name: Install OpenJDK development packages
  ansible.builtin.dnf:
    name: "{{ app_java_packages }}"
    state: present

- name: Find default Java home via /usr/lib/jvm symlink
  ansible.builtin.stat:
    path: "/usr/lib/jvm/java-{{ app_java_default_version }}-openjdk"
  register: app_java_default_jvm_stat

- name: Assert default Java home exists
  ansible.builtin.assert:
    that:
      - app_java_default_jvm_stat.stat.exists
    fail_msg: >-
      Expected /usr/lib/jvm/java-{{ app_java_default_version }}-openjdk after installing
      java-{{ app_java_default_version }}-openjdk-devel.

# alternatives expects the fully-versioned path that the JDK's RPM scriptlets
# registered (e.g. /usr/lib/jvm/java-21-openjdk-21.0.5.0.10-1.el9.x86_64/bin/java),
# not the unversioned /usr/lib/jvm/java-21-openjdk/bin/java symlink — passing
# the symlink errors out with "has not been configured as an alternative".
# Resolve it via readlink -f first.

- name: Resolve absolute path of selected java binary
  ansible.builtin.command:
    cmd: "readlink -f /usr/lib/jvm/java-{{ app_java_default_version }}-openjdk/bin/java"
  register: app_java_target_java_bin
  changed_when: false

- name: Resolve absolute path of selected javac binary
  ansible.builtin.command:
    cmd: "readlink -f /usr/lib/jvm/java-{{ app_java_default_version }}-openjdk/bin/javac"
  register: app_java_target_javac_bin
  changed_when: false

- name: Set system default java to selected version
  ansible.builtin.command:
    cmd: "alternatives --set java {{ app_java_target_java_bin.stdout }}"
  changed_when: false

- name: Set system default javac to selected version
  ansible.builtin.command:
    cmd: "alternatives --set javac {{ app_java_target_javac_bin.stdout }}"
  changed_when: false

- name: Write Java shell init to /etc/profile.d
  ansible.builtin.copy:
    dest: "{{ app_java_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      if [ -d /usr/lib/jvm/java-{{ app_java_default_version }}-openjdk ]; then
        export JAVA_HOME=/usr/lib/jvm/java-{{ app_java_default_version }}-openjdk
        export PATH="$JAVA_HOME/bin:$PATH"
      fi
