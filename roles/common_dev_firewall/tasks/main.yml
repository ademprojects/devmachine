---
- name: Gather service facts
  ansible.builtin.service_facts:
  when: common_dev_firewall_enabled | bool

- name: Open configured TCP ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ common_dev_firewall_tcp_ports }}"
  loop_control:
    label: "{{ item }}/tcp"
  when:
    - common_dev_firewall_enabled | bool
    - (ansible_facts.services['firewalld.service'].state | default('')) == 'running'

- name: Open configured UDP ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}/udp"
    permanent: true
    immediate: true
    state: enabled
  loop: "{{ common_dev_firewall_udp_ports }}"
  loop_control:
    label: "{{ item }}/udp"
  when:
    - common_dev_firewall_enabled | bool
    - (ansible_facts.services['firewalld.service'].state | default('')) == 'running'
