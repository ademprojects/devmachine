---
- name: Read passwd entry for VS Code target user
  ansible.builtin.getent:
    database: passwd
    key: "{{ app_vscode_target_user }}"

- name: Resolve target user home directory
  ansible.builtin.set_fact:
    app_vscode_target_user_home: "{{ ansible_facts.getent_passwd[app_vscode_target_user][4] }}"

- name: Verify VS Code CLI is available for {{ app_vscode_target_user }}
  ansible.builtin.command:
    cmd: /usr/bin/code --version
  become: true
  become_user: "{{ app_vscode_target_user }}"
  environment:
    HOME: "{{ app_vscode_target_user_home }}"
  register: app_vscode_cli_check
  changed_when: false
  failed_when: false

- name: Fail when VS Code CLI is unavailable for {{ app_vscode_target_user }}
  ansible.builtin.assert:
    that:
      - app_vscode_cli_check.rc == 0
    fail_msg: >-
      VS Code CLI ('code') is not available for user {{ app_vscode_target_user }}.
      Verify that the VS Code RPM was installed successfully.

# `code --install-extension <vsix-path>` always reports "successfully installed"
# (the "already installed" message only fires for marketplace IDs, not VSIX
# paths), so we get false "changed" results on every re-run. Pre-fetch the
# currently installed extensions and gate the install on a name miss.
- name: List currently installed VS Code extensions for {{ app_vscode_target_user }}
  ansible.builtin.command:
    cmd: code --list-extensions
  become: true
  become_user: "{{ app_vscode_target_user }}"
  environment:
    HOME: "{{ app_vscode_target_user_home }}"
  register: app_vscode_installed_extensions
  changed_when: false

- name: Install VS Code plugins for {{ app_vscode_target_user }}
  ansible.builtin.command:
    cmd: "code --install-extension {{ app_vscode_package_dir }}/{{ app_vscode_plugins_subdir }}/{{ item }} --force"
  become: true
  become_user: "{{ app_vscode_target_user }}"
  environment:
    HOME: "{{ app_vscode_target_user_home }}"
  loop: "{{ app_vscode_plugin_files }}"
  loop_control:
    label: "{{ item }}"
  when: (item | regex_replace('\\.vsix$', '') | lower)
    not in (app_vscode_installed_extensions.stdout_lines | map('lower') | list)
