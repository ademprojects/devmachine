---
- name: Ensure VS Code package directory exists
  ansible.builtin.file:
    path: "{{ app_vscode_package_dir }}"
    state: directory
    mode: "0755"

- name: Discover VS Code RPM in role files
  ansible.builtin.set_fact:
    app_vscode_rpm_files: >-
      {{ query('fileglob', role_path ~ '/files/code-*.rpm')
         | map('basename') | sort | list }}

- name: Fail when no VS Code RPM is bundled
  ansible.builtin.fail:
    msg: >-
      No VS Code RPM found in roles/app_vscode/files/.
      Run `tools/download-tools.sh` on the controller to fetch the latest one.
  when: app_vscode_rpm_files | length == 0
  run_once: true

- name: Fail when more than one VS Code RPM is bundled
  ansible.builtin.fail:
    msg: >-
      Multiple VS Code RPMs found in roles/app_vscode/files/
      ({{ app_vscode_rpm_files | join(', ') }}). Keep only one.
  when: app_vscode_rpm_files | length > 1
  run_once: true

- name: Resolve active VS Code RPM filename
  ansible.builtin.set_fact:
    app_vscode_rpm: "{{ app_vscode_rpm_files[0] }}"

- name: Discover VS Code plugin VSIX files in role files
  ansible.builtin.set_fact:
    app_vscode_plugin_files: >-
      {{
        query('fileglob', role_path ~ '/files/' ~ app_vscode_plugins_subdir ~ '/*.vsix')
        | map('basename')
        | sort
      }}

- name: Report discovered VS Code plugins
  ansible.builtin.debug:
    msg: >-
      VS Code RPM: {{ app_vscode_rpm }};
      {{ app_vscode_plugin_files | length }} plugin VSIX(s) discovered.

- name: Copy VS Code RPM to remote host
  ansible.builtin.copy:
    src: "{{ app_vscode_rpm }}"
    dest: "{{ app_vscode_package_dir }}/{{ app_vscode_rpm }}"
    mode: "0644"

- name: Ensure remote plugins directory exists
  ansible.builtin.file:
    path: "{{ app_vscode_package_dir }}/{{ app_vscode_plugins_subdir }}"
    state: directory
    mode: "0755"

- name: Copy VS Code plugin VSIX files to remote host
  ansible.builtin.copy:
    src: "{{ app_vscode_plugins_subdir }}/{{ item }}"
    dest: "{{ app_vscode_package_dir }}/{{ app_vscode_plugins_subdir }}/{{ item }}"
    mode: "0644"
  loop: "{{ app_vscode_plugin_files }}"
  loop_control:
    label: "{{ item }}"

- name: Read VS Code RPM checksum when provided
  ansible.builtin.stat:
    path: "{{ app_vscode_package_dir }}/{{ app_vscode_rpm }}"
    checksum_algorithm: sha256
  register: app_vscode_rpm_checksum_stat
  when: app_vscode_sha256 | length > 0

- name: Assert VS Code RPM checksum matches expected value
  ansible.builtin.assert:
    that:
      - app_vscode_rpm_checksum_stat.stat.checksum == app_vscode_sha256
    fail_msg: "VS Code RPM checksum mismatch for {{ app_vscode_rpm }}"
  when: app_vscode_sha256 | length > 0

- name: Install VS Code from local RPM
  ansible.builtin.dnf:
    name: "{{ app_vscode_package_dir }}/{{ app_vscode_rpm }}"
    state: present
    disable_gpg_check: true

- name: Provision VS Code extensions for vm_owner
  ansible.builtin.include_tasks: per_user.yml
  vars:
    app_vscode_target_user: "{{ vm_owner_name }}"

- name: Ensure ~vm_owner/Desktop exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/Desktop"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Copy VS Code desktop entry to vm_owner's Desktop
  ansible.builtin.copy:
    src: /usr/share/applications/code.desktop
    dest: "{{ vm_owner_home }}/Desktop/code.desktop"
    remote_src: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

# ---- Remote-SSH server bundle ---------------------------------------------
# VS Code Desktop on Windows looks for ~/.vscode-server/bin/<commit>/ on
# first Remote-SSH connect and downloads from update.code.visualstudio.com
# if missing — which fails on air-gapped hosts. tools/download-tools.sh
# bundles the matching server tarball as vscode-server-linux-x64-<commit>.tar.gz;
# we extract it into the right path and symlink ~vm_owner/.vscode-server
# to the data-disk install base so the server tree doesn't fill /home.

- name: Discover bundled VS Code Server tarball in role files
  ansible.builtin.set_fact:
    app_vscode_server_tarball_files: >-
      {{ query('fileglob', role_path ~ '/files/vscode-server-linux-x64-*.tar.gz')
         | map('basename') | sort | list }}

- name: Fail when no VS Code Server tarball is bundled
  ansible.builtin.fail:
    msg: >-
      No vscode-server-linux-x64-<commit>.tar.gz in roles/app_vscode/files/.
      Run `tools/download-tools.sh` on the controller to fetch the latest one.
  when: app_vscode_server_tarball_files | length == 0
  run_once: true

- name: Fail when more than one VS Code Server tarball is bundled
  ansible.builtin.fail:
    msg: >-
      Multiple VS Code Server tarballs found
      ({{ app_vscode_server_tarball_files | join(', ') }}). Keep only one.
  when: app_vscode_server_tarball_files | length > 1
  run_once: true

- name: Derive VS Code Server commit from tarball name
  ansible.builtin.set_fact:
    app_vscode_server_commit: >-
      {{ app_vscode_server_tarball_files[0]
         | regex_replace('^vscode-server-linux-x64-([a-f0-9]{40})\\.tar\\.gz$', '\\1') }}

- name: Ensure VS Code Server install base + bin dir exist on data disk
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
  loop:
    - "{{ app_vscode_server_install_base }}"
    - "{{ app_vscode_server_install_base }}/bin"

- name: Ensure versioned VS Code Server directory exists
  ansible.builtin.file:
    path: "{{ app_vscode_server_install_base }}/bin/{{ app_vscode_server_commit }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Extract VS Code Server tarball into versioned directory
  ansible.builtin.unarchive:
    src: "{{ app_vscode_server_tarball_files[0] }}"
    dest: "{{ app_vscode_server_install_base }}/bin/{{ app_vscode_server_commit }}"
    extra_opts:
      - --strip-components=1
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    creates: "{{ app_vscode_server_install_base }}/bin/{{ app_vscode_server_commit }}/bin/code-server"

- name: Stat existing ~/.vscode-server path
  ansible.builtin.stat:
    path: "{{ vm_owner_home }}/.vscode-server"
  register: app_vscode_server_home_link

- name: Refuse to clobber an existing real ~/.vscode-server directory
  ansible.builtin.fail:
    msg: >-
      {{ vm_owner_home }}/.vscode-server exists as a real directory.
      Move its contents to {{ app_vscode_server_install_base }} manually and
      remove the directory, then re-run the playbook.
  when:
    - app_vscode_server_home_link.stat.exists
    - app_vscode_server_home_link.stat.isdir
    - not app_vscode_server_home_link.stat.islnk

- name: Symlink ~/.vscode-server to the data-disk install base
  ansible.builtin.file:
    src: "{{ app_vscode_server_install_base }}"
    dest: "{{ vm_owner_home }}/.vscode-server"
    state: link
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    force: true
