---
- name: Ensure VS Code package directory exists
  ansible.builtin.file:
    path: "{{ app_vscode_package_dir }}"
    state: directory
    mode: "0755"

- name: Discover VS Code RPM in role files
  ansible.builtin.set_fact:
    app_vscode_rpm_files: >-
      {{ query('fileglob', role_path ~ '/files/code-*.rpm')
         | map('basename') | sort | list }}

- name: Fail when no VS Code RPM is bundled
  ansible.builtin.fail:
    msg: >-
      No VS Code RPM found in roles/app_vscode/files/.
      Run `tools/download-tools.sh` on the controller to fetch the latest one.
  when: app_vscode_rpm_files | length == 0
  run_once: true

- name: Fail when more than one VS Code RPM is bundled
  ansible.builtin.fail:
    msg: >-
      Multiple VS Code RPMs found in roles/app_vscode/files/
      ({{ app_vscode_rpm_files | join(', ') }}). Keep only one.
  when: app_vscode_rpm_files | length > 1
  run_once: true

- name: Resolve active VS Code RPM filename
  ansible.builtin.set_fact:
    app_vscode_rpm: "{{ app_vscode_rpm_files[0] }}"

- name: Discover VS Code plugin VSIX files in role files
  ansible.builtin.set_fact:
    app_vscode_plugin_files: >-
      {{
        query('fileglob', role_path ~ '/files/' ~ app_vscode_plugins_subdir ~ '/*.vsix')
        | map('basename')
        | sort
      }}

- name: Report discovered VS Code plugins
  ansible.builtin.debug:
    msg: >-
      VS Code RPM: {{ app_vscode_rpm }};
      {{ app_vscode_plugin_files | length }} plugin VSIX(s) discovered.

- name: Copy VS Code RPM to remote host
  ansible.builtin.copy:
    src: "{{ app_vscode_rpm }}"
    dest: "{{ app_vscode_package_dir }}/{{ app_vscode_rpm }}"
    mode: "0644"

- name: Ensure remote plugins directory exists
  ansible.builtin.file:
    path: "{{ app_vscode_package_dir }}/{{ app_vscode_plugins_subdir }}"
    state: directory
    mode: "0755"

- name: Copy VS Code plugin VSIX files to remote host
  ansible.builtin.copy:
    src: "{{ app_vscode_plugins_subdir }}/{{ item }}"
    dest: "{{ app_vscode_package_dir }}/{{ app_vscode_plugins_subdir }}/{{ item }}"
    mode: "0644"
  loop: "{{ app_vscode_plugin_files }}"
  loop_control:
    label: "{{ item }}"

- name: Read VS Code RPM checksum when provided
  ansible.builtin.stat:
    path: "{{ app_vscode_package_dir }}/{{ app_vscode_rpm }}"
    checksum_algorithm: sha256
  register: app_vscode_rpm_checksum_stat
  when: app_vscode_sha256 | length > 0

- name: Assert VS Code RPM checksum matches expected value
  ansible.builtin.assert:
    that:
      - app_vscode_rpm_checksum_stat.stat.checksum == app_vscode_sha256
    fail_msg: "VS Code RPM checksum mismatch for {{ app_vscode_rpm }}"
  when: app_vscode_sha256 | length > 0

- name: Install VS Code from local RPM
  ansible.builtin.dnf:
    name: "{{ app_vscode_package_dir }}/{{ app_vscode_rpm }}"
    state: present
    disable_gpg_check: true

- name: Provision VS Code extensions for vm_owner
  ansible.builtin.include_tasks: per_user.yml
  vars:
    app_vscode_target_user: "{{ vm_owner_name }}"

- name: Ensure ~vm_owner/Desktop exists
  ansible.builtin.file:
    path: "{{ vm_owner_home }}/Desktop"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Copy VS Code desktop entry to vm_owner's Desktop
  ansible.builtin.copy:
    src: /usr/share/applications/code.desktop
    dest: "{{ vm_owner_home }}/Desktop/code.desktop"
    remote_src: true
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
