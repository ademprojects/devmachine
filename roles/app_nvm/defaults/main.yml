---
# nvm itself + every Node binary listed below are fetched on the controller
# by tools/download-tools.sh and land in roles/app_nvm/files/. The role
# auto-discovers nvm-*.tar.gz and node-*-linux-x64.tar.xz, then extracts
# each Node tarball directly into $NVM_DIR/versions/node/<version>/ so
# `nvm install` (which would require an index.tab + SHASUMS256.txt mirror)
# is bypassed entirely — nvm picks the versions up on next source.
app_nvm_install_subdir: .nvm
# nvm lives on the data disk (installed Node versions + global npm modules can grow).
# A symlink {{ vm_owner_home }}/.nvm → app_nvm_install_dir keeps tooling that
# assumes ~/.nvm (incl. profile.d's $HOME/.nvm check) working transparently.
app_nvm_install_dir: "{{ common_storage_mount_point | default('/mnt/data') }}/nvm"
app_nvm_profile_path: /etc/profile.d/app-nvm.sh
# Keep in sync with NODE_VERSIONS in tools/download-tools.sh.
app_nvm_node_versions:
  - v24.15.0   # Krypton LTS
  - v22.22.3   # Jod LTS
# Which of the installed versions becomes `nvm alias default`.
app_nvm_node_default: v24.15.0
app_nvm_set_default: true
# Run `corepack enable` after each Node install — provides yarn + pnpm shims
# in the Node version's bin/. Corepack downloads the actual package manager
# from npm-registry (via Nexus npm-proxy) on first invocation.
app_nvm_corepack_enabled: true
app_nvm_proxy_url: "{{ proxy_url }}"
app_nvm_npm_registry_url: "{{ devmachine_npm_registry_url }}"
