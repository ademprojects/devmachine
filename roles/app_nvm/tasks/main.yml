---
- name: Ensure nvm install parent directory exists
  ansible.builtin.file:
    path: "{{ app_nvm_install_dir | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure nvm install directory exists
  ansible.builtin.file:
    path: "{{ app_nvm_install_dir }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"

- name: Discover bundled nvm tarball in role files
  ansible.builtin.set_fact:
    app_nvm_tarball_files: >-
      {{ query('fileglob', role_path ~ '/files/nvm-*.tar.gz')
         | map('basename') | sort | list }}

- name: Fail when no nvm tarball is bundled
  ansible.builtin.fail:
    msg: >-
      No nvm tarball found in roles/app_nvm/files/.
      Run `tools/download-tools.sh` on the controller to fetch it.
  when: app_nvm_tarball_files | length == 0
  run_once: true

- name: Fail when more than one nvm tarball is bundled
  ansible.builtin.fail:
    msg: >-
      Multiple nvm tarballs found in roles/app_nvm/files/
      ({{ app_nvm_tarball_files | join(', ') }}). Keep only one.
  when: app_nvm_tarball_files | length > 1
  run_once: true

- name: Install nvm from local tarball
  ansible.builtin.unarchive:
    src: "{{ app_nvm_tarball_files[0] }}"
    dest: "{{ app_nvm_install_dir }}"
    extra_opts:
      - --strip-components=1
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    creates: "{{ app_nvm_install_dir }}/nvm.sh"

- name: Stat existing ~/.nvm path
  ansible.builtin.stat:
    path: "{{ vm_owner_home }}/{{ app_nvm_install_subdir }}"
  register: app_nvm_home_link

- name: Refuse to clobber an existing real ~/.nvm directory
  ansible.builtin.fail:
    msg: >-
      {{ vm_owner_home }}/{{ app_nvm_install_subdir }} exists as a real directory.
      Move its contents to {{ app_nvm_install_dir }} manually and remove the directory,
      then re-run the playbook. The role will not silently replace a real directory.
  when:
    - app_nvm_home_link.stat.exists
    - app_nvm_home_link.stat.isdir
    - not app_nvm_home_link.stat.islnk

- name: Symlink ~/.nvm to data-disk install
  ansible.builtin.file:
    src: "{{ app_nvm_install_dir }}"
    dest: "{{ vm_owner_home }}/{{ app_nvm_install_subdir }}"
    state: link
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    force: true

- name: Write nvm shell init to /etc/profile.d
  ansible.builtin.copy:
    dest: "{{ app_nvm_profile_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      if [ -s "$HOME/{{ app_nvm_install_subdir }}/nvm.sh" ]; then
        export NVM_DIR="$HOME/{{ app_nvm_install_subdir }}"
        export NVM_NODEJS_ORG_MIRROR="{{ app_nvm_nodejs_mirror_url }}"
        \. "$NVM_DIR/nvm.sh"
      fi

# ----- local file:// mirror so `nvm install` skips the network -------------

- name: Discover bundled Node binary tarballs in role files
  ansible.builtin.set_fact:
    app_nvm_node_tarball_files: >-
      {{ query('fileglob', role_path ~ '/files/node-*-linux-x64.tar.xz')
         | map('basename') | sort | list }}

- name: Assert every requested Node version is bundled
  ansible.builtin.assert:
    that:
      - ('node-' ~ item ~ '-linux-x64.tar.xz') in app_nvm_node_tarball_files
    fail_msg: >-
      node-{{ item }}-linux-x64.tar.xz not in roles/app_nvm/files/.
      Run `NODE_VERSIONS="{{ app_nvm_node_versions | join(' ') }}" tools/download-tools.sh`
      on the controller. Bundled versions:
      {{ app_nvm_node_tarball_files | join(', ') | default('none', true) }}.
  loop: "{{ app_nvm_node_versions }}"
  loop_control:
    label: "{{ item }}"

- name: Ensure per-version Node mirror dirs exist
  ansible.builtin.file:
    path: "{{ app_nvm_install_dir }}/nodejs-dist/{{ item }}"
    state: directory
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0755"
  loop: "{{ app_nvm_node_versions }}"
  loop_control:
    label: "{{ item }}"

- name: Place Node binaries into local mirror
  ansible.builtin.copy:
    src: "node-{{ item }}-linux-x64.tar.xz"
    dest: "{{ app_nvm_install_dir }}/nodejs-dist/{{ item }}/node-{{ item }}-linux-x64.tar.xz"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
    force: false
  loop: "{{ app_nvm_node_versions }}"
  loop_control:
    label: "{{ item }}"

- name: Place SHASUMS256.txt into local mirror
  ansible.builtin.copy:
    src: "node-{{ item }}-SHASUMS256.txt"
    dest: "{{ app_nvm_install_dir }}/nodejs-dist/{{ item }}/SHASUMS256.txt"
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
    force: false
  loop: "{{ app_nvm_node_versions }}"
  loop_control:
    label: "{{ item }}"

# ----- install + default ---------------------------------------------------

- name: Install configured Node versions via nvm (uses the local mirror)
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      . "{{ app_nvm_install_dir }}/nvm.sh"
      nvm install {{ item }}
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    NVM_DIR: "{{ app_nvm_install_dir }}"
    NVM_NODEJS_ORG_MIRROR: "{{ app_nvm_nodejs_mirror_url }}"
  loop: "{{ app_nvm_node_versions }}"
  loop_control:
    label: "{{ item }}"
  register: app_nvm_install_results
  changed_when: "'Now using node' in (app_nvm_install_results.stdout | default(''))"

- name: Set default Node version for vm_owner
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      . "{{ app_nvm_install_dir }}/nvm.sh"
      nvm alias default {{ app_nvm_node_default }}
  become: true
  become_user: "{{ vm_owner_name }}"
  environment:
    HOME: "{{ vm_owner_home }}"
    NVM_DIR: "{{ app_nvm_install_dir }}"
  changed_when: false
  when: app_nvm_set_default | bool

- name: Configure npm registry to Nexus for vm_owner
  ansible.builtin.copy:
    dest: "{{ vm_owner_home }}/.npmrc"
    content: |
      registry={{ app_nvm_npm_registry_url }}
    owner: "{{ vm_owner_name }}"
    group: "{{ vm_owner_group }}"
    mode: "0644"
